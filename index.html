<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Maitino | Emisión Autónoma Maestro</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --broadcast-red: #d0021b; --studio-dark: #111111; --surface: #ffffff;
            --bg-color: #f4f4f7; --text-primary: #1d1d1f; --text-secondary: #86868b;
            --border-subtle: #e5e5ea; --shadow-elevation: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
        }
        body { background-color: var(--bg-color); color: var(--text-primary); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        header { width: 100%; background: var(--surface); padding: 20px 0; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid var(--border-subtle); position: relative; z-index: 10; }
        .brand { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px; }
        .brand span { color: var(--broadcast-red); }
        .tally-light { width: 10px; height: 10px; background-color: #e5e5ea; border-radius: 50%; transition: all 0.5s ease; }
        .tally-light.live { background-color: var(--broadcast-red); box-shadow: 0 0 12px rgba(208, 2, 27, 0.6); }
        .studio-wrapper { width: 100%; max-width: 480px; padding: 40px 20px; display: flex; flex-direction: column; gap: 30px; box-sizing: border-box; }
        .broadcast-card { background: var(--surface); border-radius: 24px; padding: 40px 30px; box-shadow: var(--shadow-elevation); text-align: center; position: relative; overflow: hidden; border: 1px solid #fff; }
        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 100px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; background: #f5f5f7; color: var(--text-secondary); margin-bottom: 25px; transition: all 0.3s ease; }
        
        /* Paleta de colores para jerarquías */
        .status-badge.estudiolive { background: var(--broadcast-red); color: white; box-shadow: 0 4px 10px rgba(208,2,27,0.3); }
        .status-badge.emergency { background: #742a2a; color: white; }
        .status-badge.breaking, .status-badge.breaking_live, .status-badge.breaking_news, .status-badge.thirty_breaking_news { background: #ff003c; color: white; font-weight: 800; }
        .status-badge.special { background: #6b46c1; color: white; }
        .status-badge.sports { background: #2f855a; color: #f0fff4; border: 1px solid #48bb78; }
        .status-badge.chimes { background: #2d3748; color: #fff; }
        .status-badge.hour { background: #edf2f7; color: #2d3748; border: 1px solid #cbd5e0; }
        .status-badge.news { background: #ffe5e5; color: var(--broadcast-red); }
        .status-badge.weather { background: #e0f2fe; color: #0284c7; border: 1px solid #bae6fd; }
        .status-badge.traffic { background: #feebc8; color: #dd6b20; border: 1px solid #fbd38d; }
        .status-badge.schedule { background: #e2e8f0; color: #2b6cb0; }
        .status-badge.live { background: #dd6b20; color: white; }
        .status-badge.live_free, .status-badge.live3 { background: #3182ce; color: white; }
        .status-badge.podcast { background: #4a5568; color: #edf2f7; }
        .status-badge.interview { background: #feebc8; color: #c05621; }
        .status-badge.space { background: #edf2f7; color: #4a5568; }
        .status-badge.promo { background: #ebf8ff; color: #2b6cb0; }
        .status-badge.jingle { background: #e5ffe5; color: #009900; }
        .status-badge.ad { background: #fff4e5; color: #cc7a00; }
        .status-badge.filler { background: #f5f5f7; color: var(--text-secondary); }
        .status-badge.off { background: #1a202c; color: #f7fafc; }
        .status-badge.error_fallback { background: #c53030; color: white; font-weight: 800; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .album-art { position: relative; width: 140px; height: 140px; background: #f5f5f7; border-radius: 20px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.03); overflow: hidden; }
        .album-art img { position: absolute; width: 100%; height: 100%; border-radius: 20px; object-fit: cover; z-index: 1; }
        #visualizer-canvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; z-index: 2; opacity: 0.85; pointer-events: none; }
        
        h2 { margin: 0 0 8px 0; font-size: 1.5rem; letter-spacing: -0.8px; color: var(--text-primary); transition: color 0.3s; line-height: 1.3; }
        p.subtitle { margin: 0 0 30px 0; font-size: 1rem; color: var(--text-secondary); font-weight: 400; transition: color 0.3s; }
        
        .clock-display { font-family: 'JetBrains Mono', monospace; font-size: 2.5rem; font-weight: 700; color: var(--studio-dark); letter-spacing: -2px; margin-bottom: 30px; font-variant-numeric: tabular-nums; }

        .pwr-btn { width: 72px; height: 72px; border-radius: 50%; border: none; background: var(--studio-dark); color: white; font-size: 1.4rem; cursor: pointer; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .pwr-btn:hover { transform: scale(1.05); }
        .pwr-btn:active { transform: scale(0.95); }
        .pwr-btn.active { background: var(--broadcast-red); box-shadow: 0 10px 30px rgba(208, 2, 27, 0.4); }
        
        .volume-control { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 30px; color: var(--text-secondary); }
        input[type=range] { -webkit-appearance: none; width: 120px; height: 4px; background: #e5e5ea; border-radius: 2px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: white; border: 1px solid rgba(0, 0, 0, 0.1); box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15); border-radius: 50%; cursor: pointer; }
        
        .schedule-card { background: var(--surface); border-radius: 20px; padding: 25px; box-shadow: var(--shadow-elevation); }
        .schedule-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; margin-bottom: 20px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 10px; }
        .schedule-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f7; font-size: 0.95rem; color: var(--text-secondary); }
        .schedule-item:last-child { border-bottom: none; }
        .schedule-item.active { color: var(--text-primary); font-weight: 600; }
        .schedule-item.active .time { color: var(--broadcast-red); }
        .time { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
    </style>
</head>

<body>
    <header>
        <div class="brand"><div class="tally-light" id="tally"></div>RADIO MAITINO</div>
    </header>

    <div class="studio-wrapper">
        <div class="broadcast-card">
            <div id="status-badge" class="status-badge">Radio Maitino</div>
            <div class="album-art" id="art">
                <img id="art-img" src="https://ia600602.us.archive.org/32/items/r-maitino-psd-1400.1400/r%20maitino%20psd%201400.1400.png" alt="Radio Maitino">
                <canvas id="visualizer-canvas" width="140" height="60"></canvas>
            </div>
            <h2 id="main-title">Radio Maitino</h2>
            <p class="subtitle" id="sub-title">Sintonizar</p>
            <div class="clock-display" id="clock">--:--:--</div>
            <button class="pwr-btn" id="pwr-btn" onclick="toggleBroadcast()"><i class="fas fa-power-off"></i></button>
            <div class="volume-control">
                <i class="fas fa-volume-down fa-xs"></i>
                <input type="range" min="0" max="1" step="0.01" value="0.9" oninput="updateVolume(this.value)">
                <i class="fas fa-volume-up fa-xs"></i>
            </div>
        </div>

        <div class="schedule-card">
            <div class="schedule-title">Parrilla Horaria</div>
            <div id="schedule-list"><div class="schedule-item">Sintonizando...</div></div>
        </div>
    </div>

    <audio id="deck-a" preload="auto" playsinline crossorigin="anonymous"></audio>
    <audio id="deck-b" preload="auto" playsinline crossorigin="anonymous"></audio>

    <script>
        const CONFIG = {
            api: "https://script.google.com/macros/s/AKfycbzoQfFFkwSOoZlnX73FKn8lEtbcRSEe6CYXPeuZ6tZPG5OsBuXivvvGtBJhGJhPC7GU/exec",
            crossfadeDur: 2, 
            pollInterval: 90,
            defaultLogo: "https://ia600602.us.archive.org/32/items/r-maitino-psd-1400.1400/r%20maitino%20psd%201400.1400.png"
        };
        const SILENCE_MP3 = "data:audio/mpeg;base64,SUQzBAAAAAABEVRYWFgAAAAtAAADY29tbWVudABpRDIzIHYyLjMuMCBhbmQgaWQzIHYyLjQuMCB0YWdzAAAAAAAAAAAA//MkxAAKAAAABpAAAAWSAAAAASU1BTUUzLjk5LjVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV";
        
        // --- CONFIGURACIÓN DE EMERGENCIA ---
        const AUDIO_AVISO_CAIDA = "https://tu-url-de-audio.com/aviso_caida.mp3"; 
        let errorCount = 0;
        const MAX_ERRORS = 4;
        let isInEmergencyMode = false;

        let systemOn = false, userVolume = 0.9, faderLevel = 1.0, currentSourceUrl = "", currentMode = 'FILLER';
        let currentCrossfade = CONFIG.crossfadeDur;
        
        let deckA = document.getElementById('deck-a'), deckB = document.getElementById('deck-b');
        let activeDeck = deckA, fadingDeck = null, fadeOutEndTime = 0, isTransitioning = false; 
        let isDataLoaded = false;
        let visStartTime = Date.now(); 
        let lastDriftCorrection = 0; 
        let lastIdlePreloadedUrl = "";

        let library = { news: null, chimes: null, weather: null, traffic: null, hours: {}, breaking: null, ads: [], jingles: [], spaces: [], promos: [], filler: [], schedule: {0:[],1:[],2:[],3:[],4:[],5:[],6:[]}, scheduleDates: {} };
        let activeLiveState = { src: "", startTime: 0 }; // Tracker optimizado solo para conexiones en directo
        let lastPipFired = -1;
        let lastClockSec = -1, lastScheduleSec = -1; 
        
        const activePreloads = new Map();
        const DURATION_CACHE = new Map(); 

        const el = {
            clock: document.getElementById('clock'), title: document.getElementById('main-title'), sub: document.getElementById('sub-title'), 
            img: document.getElementById('art-img'), badge: document.getElementById('status-badge'), tally: document.getElementById('tally'),
            btn: document.getElementById('pwr-btn'), sch: document.getElementById('schedule-list'), canvas: document.getElementById('visualizer-canvas')
        };

        // --- GENERADOR SINTÉTICO DE "PIPS" EN FORMATO WAV ---
        let pipShortUrl = "", pipLongUrl = "";
        function generateBeepBlob(durationMs, frequency) {
            const sampleRate = 8000;
            const numSamples = Math.floor(sampleRate * (durationMs / 1000));
            const buffer = new Uint8Array(44 + numSamples);
            
            const writeString = (offset, str) => { for (let i = 0; i < str.length; i++) buffer[offset + i] = str.charCodeAt(i); };
            const writeUint32 = (offset, val) => { buffer[offset] = val & 0xff; buffer[offset+1] = (val >> 8) & 0xff; buffer[offset+2] = (val >> 16) & 0xff; buffer[offset+3] = (val >> 24) & 0xff; };
            const writeUint16 = (offset, val) => { buffer[offset] = val & 0xff; buffer[offset+1] = (val >> 8) & 0xff; };

            writeString(0, 'RIFF'); writeUint32(4, 36 + numSamples); writeString(8, 'WAVE'); writeString(12, 'fmt ');
            writeUint32(16, 16); writeUint16(20, 1); writeUint16(22, 1); writeUint32(24, sampleRate);
            writeUint32(28, sampleRate); writeUint16(32, 1); writeUint16(34, 8); writeString(36, 'data');
            writeUint32(40, numSamples);

            for (let i = 0; i < numSamples; i++) {
                const t = i / sampleRate;
                const val = Math.round(128 + 120 * Math.sin(2 * Math.PI * frequency * t));
                buffer[44 + i] = val;
            }
            return new Blob([buffer], { type: 'audio/wav' });
        }

        function initPips() {
            if (!pipShortUrl) {
                pipShortUrl = URL.createObjectURL(generateBeepBlob(100, 1000));
                pipLongUrl = URL.createObjectURL(generateBeepBlob(500, 1000));
            }
        }

        function playPip(dur) {
            initPips();
            let p = new Audio(dur === 0.1 ? pipShortUrl : pipLongUrl);
            p.volume = userVolume * 0.5;
            p.play().catch(() => {});
        }

        // --- CÁLCULO DINÁMICO DE DURACIÓN (EL TIEMPO Y TRÁFICO) ---
        function actualizarDuracionDinamica(item) {
            if (!item || !item.src) return Promise.resolve(item);
            
            const esDinamico = item.src.includes('meteoelx.com') || item.src.includes('dgt.es') || item.type === 'weather' || item.type === 'traffic';
            if (!esDinamico) return Promise.resolve(item);

            const cacheKey = item.src;
            const cached = DURATION_CACHE.get(cacheKey);
            
            if (cached && (Date.now() - cached.time < 300000)) {
                item.dur = cached.dur;
                return Promise.resolve(item);
            }

            return new Promise((resolve) => {
                let temp = new Audio();
                temp.preload = "metadata";
                temp.src = item.src;
                
                let resolved = false;
                const finalizar = (dur) => {
                    if (resolved) return;
                    resolved = true;
                    temp.onloadedmetadata = null;
                    temp.onerror = null;
                    if (dur && isFinite(dur) && dur > 0) {
                        item.dur = Math.ceil(dur);
                        DURATION_CACHE.set(cacheKey, { dur: item.dur, time: Date.now() });
                    } else {
                        item.dur = (item.type === 'weather') ? 60 : 90; 
                    }
                    resolve(item);
                };

                temp.onloadedmetadata = () => finalizar(temp.duration);
                temp.onerror = () => finalizar(item.type === 'weather' ? 60 : 90);
                setTimeout(() => finalizar(item.type === 'weather' ? 60 : 90), 5000);
            });
        }

        async function resolverDuracionesDinámicas() {
            let promises = [];
            if (library.weather) promises.push(actualizarDuracionDinamica(library.weather));
            if (library.traffic) promises.push(actualizarDuracionDinamica(library.traffic));
            
            Object.values(library.hours).forEach(item => {
                if (item && (item.src.includes('meteoelx.com') || item.src.includes('dgt.es'))) {
                    promises.push(actualizarDuracionDinamica(item));
                }
            });

            Object.keys(library.schedule).forEach(day => {
                library.schedule[day].forEach(item => {
                    if (item && (item.src.includes('meteoelx.com') || item.src.includes('dgt.es'))) {
                        promises.push(actualizarDuracionDinamica(item));
                    }
                });
            });

            await Promise.allSettled(promises);
            updateScheduleUI();
        }

        // --- CONTROL DE VOLUMEN DIRECTO ---
        function updateVolume(val) { 
            userVolume = val; 
            if (activeDeck) activeDeck.volume = userVolume * faderLevel;
        }

        function safePlay(audioElem) {
            if (!audioElem || !audioElem.src || audioElem.src === window.location.href) return;
            let playPromise = audioElem.play();
            if (playPromise !== undefined) {
                playPromise.catch(err => { console.warn("Retraso en carga o bloqueo:", err); });
            }
        }

        function updateBtnState() {
            if (!systemOn) el.btn.innerHTML = '<i class="fas fa-power-off"></i>';
            else if (activeDeck.src && (activeDeck.readyState < 3 && !activeDeck.paused)) el.btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            else el.btn.innerHTML = '<i class="fas fa-stop"></i>';
        }

        [deckA, deckB].forEach(d => { 
            ['waiting','playing','canplay','stalled'].forEach(e => d.addEventListener(e, updateBtnState)); 
        });

        function getSpainTime() {
            let now = new Date();
            let pts = new Intl.DateTimeFormat('en-US', { timeZone: 'Europe/Madrid', year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: false }).formatToParts(now);
            let v = {}; pts.forEach(p => v[p.type] = p.value);
            return new Date(v.year, v.month - 1, v.day, (v.hour === "24" ? 0 : v.hour), v.minute, v.second, now.getMilliseconds());
        }

        async function initSystem() {
            await fetchData(); 
            setInterval(fetchData, CONFIG.pollInterval * 1000); 

            // --- REPRODUCCIÓN AUTOMÁTICA DIRECTA PRIORIZADA ---
            const intentarAutoPlay = () => {
                if (!systemOn) {
                    toggleBroadcast();
                }
            };
            
            intentarAutoPlay();

            // Respaldo de interacción directa: si el navegador detiene el autoplay,
            // se iniciará de forma fluida e inmediata en cuanto el usuario clique o toque cualquier parte.
            document.addEventListener('click', intentarAutoPlay, { once: true });
            document.addEventListener('touchstart', intentarAutoPlay, { once: true });
        }

        async function fetchData() {
            try { 
                let res = await fetch(CONFIG.api, { redirect: 'follow' }); 
                let data = await res.json(); 
                
                processData(data); 
                
                // 1. Marcamos la emisión como lista y cargada INMEDIATAMENTE
                isDataLoaded = true; 
                errorCount = 0; 
                isInEmergencyMode = false;
                updateScheduleUI(); 
                
                // 2. Resolvemos los cálculos pesados asíncronamente en segundo plano
                resolverDuracionesDinámicas().then(() => {
                    updateScheduleUI(); 
                }).catch(err => console.warn("Error calculando duraciones", err));
                
            } 
            catch (e) { manejarError(); }
        }

        function manejarError() {
            errorCount++;
            if (errorCount >= MAX_ERRORS) isInEmergencyMode = true;
        }

        function addToSchedule(item) {
            let s1 = String(item.dayRaw || "").trim();
            let s2 = String(item.hourRaw || "").trim(); 
            let startSecs = -1;
            let m = s2.match(/^(\d{1,2}):(\d{2})/);
            if (m) startSecs = parseInt(m[1], 10) * 3600 + parseInt(m[2], 10) * 60;
            if (startSecs === -1) return;
            item.startSecs = startSecs;

            let days = []; 
            if (s1 && s1.toLowerCase() !== "null") {
                s1.split(',').forEach(p => { 
                    if (p.includes('-')) { let l = p.split('-'); for (let i = parseInt(l[0]); i <= parseInt(l[1]); i++) days.push(i); } 
                    else { days.push(parseInt(p)); } 
                });
            }
            if (days.length === 0) days = [0, 1, 2, 3, 4, 5, 6]; 
            [...new Set(days)].forEach(d => { if(library.schedule[d]) library.schedule[d].push(item); });
        }

        function parseAndRotateLink(url) { 
            if (!url) return ""; 
            let trimmed = url.trim();
            let urlList = trimmed.split('|'); 
            if (urlList.length > 1) {
                let now = getSpainTime();
                let start = new Date(now.getFullYear(), 0, 0);
                let diff = (now - start) + ((start.getTimezoneOffset() - now.getTimezoneOffset()) * 60000);
                let dayOfYear = Math.floor(diff / 86400000);
                let selectedIndex = dayOfYear % urlList.length;
                return urlList[selectedIndex].trim();
            }
            return trimmed; 
        }

        function processData(data) {
            library = { news: null, chimes: null, weather: null, traffic: null, hours: {}, breaking: null, ads: [], jingles: [], spaces: [], promos: [], filler: [], schedule: {0:[],1:[],2:[],3:[],4:[],5:[],6:[]}, scheduleDates: {} };
            
            data.forEach(row => {
                if (!row.type || String(row.type).trim() === "") return;
                
                let typeRaw = row.type.toLowerCase().replace(/\s+/g, '');
                if (typeRaw === 'imageradio') {
                    let imgVal = row.image || row.src || "";
                    if (imgVal) CONFIG.defaultLogo = imgVal;
                    return; 
                }

                let processedSrc = parseAndRotateLink(row.src);
                let item = { src: processedSrc, title: row.title || "Emisión", artist: row.artist || "Radio Maitino", img: row.image || "", dur: parseInt(row.duration) || 300, type: typeRaw, dayRaw: row.day, hourRaw: row.hour };
                let t = item.type;

                if (['news', 'breaking_news', 'thirty_breaking_news'].includes(t)) library.news = item; 
                else if (t === 'weather') library.weather = item; 
                else if (t === 'traffic') library.traffic = item; 
                else if (t === 'chimes') library.chimes = item;
                else if (t === 'space' && !item.hourRaw) library.spaces.push(item);
                else if (t === 'hour') { let m = String(item.hourRaw||"").trim().match(/^(\d{1,2}):(\d{2})/); if(m) library.hours[parseInt(m[1], 10)] = item; else library.hours['default'] = item; } 
                else if (['breaking', 'breaking_live', 'emergency', 'estudiolive'].includes(t)) {
                    if (item.dayRaw || item.hourRaw) addToSchedule(item); 
                    else library.breaking = item; 
                }
                else if (t === 'jingle') library.jingles.push(item); 
                else if (t === 'ad') library.ads.push(item);
                else if (t === 'promo') library.promos.push(item);
                else if (['schedule', 'podcast', 'interview', 'off', 'sports', 'live', 'live_free', 'live3', 'special'].includes(t)) {
                    if (item.dayRaw || item.hourRaw) addToSchedule(item); else library.filler.push(item);
                } else { library.filler.push(item); }
            });
        }

        // --- PRECARGA EFICIENTE DE RECURSOS ---
        function actualizarPrecarga(urlActual, urlsSiguientes = []) {
            let urlsNecesarias = [urlActual, ...urlsSiguientes].filter(url => url && !url.startsWith('data:'));
            
            for (let url of activePreloads.keys()) {
                if (!urlsNecesarias.includes(url)) {
                    let oldAudio = activePreloads.get(url);
                    oldAudio.src = "";
                    oldAudio.load();
                    activePreloads.delete(url);
                }
            }

            urlsNecesarias.forEach(url => {
                if (!activePreloads.has(url)) {
                    let pre = new Audio();
                    pre.preload = "auto";
                    pre.src = url;
                    activePreloads.set(url, pre);
                }
            });
        }

        // --- ENRUTADOR IDLE DE DECK ---
        function preprocesarIdleDeck(nextUrl) {
            if (!nextUrl || nextUrl.startsWith('data:')) return;
            let idleDeck = (activeDeck === deckA) ? deckB : deckA;
            if (idleDeck !== fadingDeck && lastIdlePreloadedUrl !== nextUrl && !isTransitioning) {
                idleDeck.src = nextUrl;
                idleDeck.load();
                lastIdlePreloadedUrl = nextUrl;
            }
        }

        function initAudio() {
            initPips();
            requestAnimationFrame(drawVisualizer);
        }

        function drawVisualizer() {
            if (!systemOn) return; requestAnimationFrame(drawVisualizer);
            if (document.hidden || userVolume <= 0.01) return;

            let ctx = el.canvas.getContext('2d');
            ctx.clearRect(0, 0, el.canvas.width, el.canvas.height);

            let isAudioPlaying = (activeDeck && !activeDeck.paused && activeDeck.readyState >= 3);
            let time = (Date.now() - visStartTime) / 150;

            for(let i = 0; i < 32; i++) { 
                let bh = 2; 
                if (isAudioPlaying) {
                    let wave = Math.sin(time + i * 0.2) * Math.cos(time * 0.8 + i * 0.5);
                    bh = Math.max(2, (wave * 0.5 + 0.5) * (Math.random() * 0.5 + 0.5) * 50 * userVolume * faderLevel);
                }
                ctx.fillStyle = 'rgba(208, 2, 27, 0.85)'; 
                ctx.fillRect(i * (140/32), 60 - bh, (140/32)*0.8, bh); 
            }
        }

        function gestionarPips(m, s) {
            let isApproachingHour = (m === 59 || m === 29);
            if (!isApproachingHour && !(m === 0 || m === 30)) { lastPipFired = -1; return; }
            if (isApproachingHour && s >= 55 && s <= 59) { if (lastPipFired !== s) { lastPipFired = s; playPip(0.1); } } 
            else if ((m === 0 || m === 30) && s === 0) { if (lastPipFired !== s) { lastPipFired = s; playPip(0.5); } }
        }

        let broadcastLoopTimer = null;
        function toggleBroadcast() {
            if (!systemOn) {
                initAudio(); 
                visStartTime = Date.now(); 
                deckA.src = SILENCE_MP3; safePlay(deckA); deckB.src = SILENCE_MP3; safePlay(deckB); 
                systemOn = true; el.btn.classList.add('active'); el.tally.classList.add('live'); updateBtnState(); requestAnimationFrame(visualLoop); 
                
                function loop() { if (systemOn) { broadcastLogic(); broadcastLoopTimer = setTimeout(loop, 1000); } }
                loop();
            } else {
                systemOn = false; el.btn.classList.remove('active'); el.tally.classList.remove('live'); updateBtnState();
                clearTimeout(broadcastLoopTimer);
                activeDeck.pause(); activeDeck.removeAttribute('src'); activeDeck.load();
                if (fadingDeck) { fadingDeck.pause(); fadingDeck.removeAttribute('src'); fadingDeck.load(); fadingDeck = null; }
                currentSourceUrl = ""; 
                updateDisplay({ title: "Emisión Detenida", artist: "Off Air", img: "" }, 'OFF', "status-badge off");
                el.canvas.getContext('2d').clearRect(0, 0, el.canvas.width, el.canvas.height);
            }
        }

        function broadcastLogic() {
            if (!systemOn) return;
            const now = getSpainTime();
            const d = now.getDay(), h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();
            
            const secInDay = h * 3600 + m * 60 + s + (ms / 1000);
            const secInHour = m * 60 + s + (ms / 1000);
            
            gestionarPips(m, s);

            if (s === lastScheduleSec) return;
            lastScheduleSec = s;

            if (isInEmergencyMode) {
                let nextItem = { src: AUDIO_AVISO_CAIDA, title: "Radio Maitino", artist: "Aviso de Mantenimiento", img: CONFIG.defaultLogo, type: "error_fallback", dur: 300 };
                ejecutarAudio(nextItem, (Math.floor(Date.now() / 1000)) % 300, 'ERROR_FALLBACK');
                return;
            }

            // GESTOR OPTIMIZADO PARA DIRECTOS GLOBALES (Sin bloquear pre-grabados)
            if (library.breaking && ['estudiolive', 'breaking_live'].includes(library.breaking.type)) {
                if (activeLiveState.src !== library.breaking.src) {
                    activeLiveState = { src: library.breaking.src, startTime: Date.now() / 1000 };
                }
            } else {
                activeLiveState = { src: "", startTime: 0 };
            }

            let nextItem = null, seekPos = 0, mode = 'FILLER';
            let urlsSiguientesParaCache = []; 

            let scheduledShow = (library.schedule[d] || []).find(sh => secInDay >= sh.startSecs && secInDay < (sh.startSecs + sh.dur));

            if (scheduledShow && scheduledShow.type === 'off') {
                nextItem = { src: SILENCE_MP3, title: "Fuera de Antena", artist: "Radio Maitino", img: CONFIG.defaultLogo, type: "off" };
                ejecutarAudio(nextItem, 0, 'OFF'); return;
            }

            let isEstudioLive = (scheduledShow && scheduledShow.type === 'estudiolive') || (library.breaking && library.breaking.type === 'estudiolive');
            
            if (isEstudioLive) {
                nextItem = (scheduledShow && scheduledShow.type === 'estudiolive') ? scheduledShow : library.breaking;
                if (scheduledShow && scheduledShow.type === 'estudiolive') {
                    seekPos = Math.max(0, secInDay - scheduledShow.startSecs);
                } else {
                    seekPos = (Date.now() / 1000) - activeLiveState.startTime;
                }
                mode = 'ESTUDIOLIVE';
            } 
            else if (library.breaking || (scheduledShow && ['breaking', 'breaking_live', 'emergency'].includes(scheduledShow.type))) {
                let alertItem = (scheduledShow && ['breaking', 'breaking_live', 'emergency'].includes(scheduledShow.type)) ? scheduledShow : library.breaking;
                nextItem = alertItem;
                mode = alertItem.type.toUpperCase();
                
                if (alertItem.type === 'breaking_live') {
                    seekPos = scheduledShow ? Math.max(0, secInDay - alertItem.startSecs) : ((Date.now() / 1000) - activeLiveState.startTime);
                } else {
                    // BUCLE INFINITO ASEGURADO PARA ALERTA PRE-GRABADA HASTA SU ELIMINACIÓN
                    seekPos = (Math.floor(Date.now() / 1000)) % Math.max(1, alertItem.dur);
                }
            }
            else if ((library.news && library.news.type === 'breaking_news' && m === 0) || 
                     (library.news && library.news.type === 'thirty_breaking_news' && m === 30)) {
                
                let forceSeq = [];
                if (library.hours[h]) {
                    forceSeq.push({...library.hours[h], cMode: 'HOUR'});
                    forceSeq.push({ src: SILENCE_MP3, title: library.news ? library.news.title : "Informativo Urgente", artist: library.news ? library.news.artist : "Radio Maitino", img: library.news ? library.news.img : CONFIG.defaultLogo, dur: 1, type: 'silence', cMode: 'SILENCE' });
                }
                forceSeq.push({...library.news, cMode: 'NEWS'});
                if (library.weather) forceSeq.push({...library.weather, cMode: 'WEATHER'});
                if (library.traffic) forceSeq.push({...library.traffic, cMode: 'TRAFFIC'}); 
                if (library.ads.length > 0) forceSeq.push({...library.ads[h % library.ads.length], cMode: 'AD'});

                let forceDur = forceSeq.reduce((a, b) => a + Math.max(1, b.dur), 0);
                if (secInHour < forceDur) {
                    let c = secInHour;
                    for (let i = 0; i < forceSeq.length; i++) {
                        let itm = forceSeq[i];
                        let idur = Math.max(1, itm.dur);
                        if (c < idur) { 
                            nextItem = itm; seekPos = c; mode = itm.cMode; 
                            if(forceSeq[i+1]) urlsSiguientesParaCache.push(forceSeq[i+1].src);
                            if(forceSeq[i+2]) urlsSiguientesParaCache.push(forceSeq[i+2].src);
                            break; 
                        }
                        c -= idur;
                    }
                }
            }
            if (!nextItem && scheduledShow && ['chimes', 'live', 'special', 'sports'].includes(scheduledShow.type)) {
                if (scheduledShow.type === 'chimes' && h === 0 && m === 0 && secInHour < Math.max(1, scheduledShow.dur)) {
                    nextItem = scheduledShow; seekPos = secInHour; mode = 'CHIMES';
                } else if (scheduledShow.type !== 'chimes') {
                    nextItem = scheduledShow;
                    seekPos = Math.max(0, secInDay - scheduledShow.startSecs);
                    mode = scheduledShow.type.toUpperCase();
                }
            }

            if (!nextItem) {
                let curH = (h === 0) ? library.chimes : (library.hours[h] || library.hours['default']);
                let tohSeq = [];
                
                if (curH) {
                    tohSeq.push({...curH, computedMode: 'HOUR'});
                    tohSeq.push({ src: SILENCE_MP3, title: library.news ? library.news.title : "Boletín Informativo", artist: library.news ? library.news.artist : "Radio Maitino", img: library.news ? library.news.img : CONFIG.defaultLogo, dur: 1, type: 'silence', computedMode: 'SILENCE' });
                }
                if (library.news && !['breaking_news', 'thirty_breaking_news'].includes(library.news.type)) {
                    tohSeq.push({...library.news, computedMode: 'NEWS'});
                }
                if (library.weather) tohSeq.push({...library.weather, computedMode: 'WEATHER'});
                if (library.traffic) tohSeq.push({...library.traffic, computedMode: 'TRAFFIC'}); 
                if (library.ads.length > 0) tohSeq.push({...library.ads[h % library.ads.length], computedMode: 'AD'});

                let blockDur = tohSeq.reduce((a, b) => a + Math.max(1, b.dur), 0);

                if (secInHour < blockDur) {
                    let c = secInHour;
                    for (let i = 0; i < tohSeq.length; i++) {
                        let itm = tohSeq[i];
                        let idur = Math.max(1, itm.dur);
                        if (c < idur) { 
                            nextItem = itm; seekPos = c; mode = itm.computedMode; 
                            if(tohSeq[i+1]) urlsSiguientesParaCache.push(tohSeq[i+1].src);
                            if(tohSeq[i+2]) urlsSiguientesParaCache.push(tohSeq[i+2].src);
                            break; 
                        }
                        c -= idur;
                    }
                } 
                else if (scheduledShow) {
                    let delay = (scheduledShow.startSecs % 3600 === 0) ? blockDur : 0;
                    nextItem = scheduledShow;
                    seekPos = Math.max(0, (secInDay - scheduledShow.startSecs) - delay);
                    
                    if (['live_free', 'live3'].includes(scheduledShow.type)) mode = 'LIVE_FREE';
                    else if (scheduledShow.type === 'podcast') mode = 'PODCAST';
                    else if (scheduledShow.type === 'interview') mode = 'INTERVIEW';
                    else mode = 'SHOW';
                } 
                else {
                    mode = 'FILLER';
                    let seq = [];
                    library.filler.forEach((f, idx) => {
                        seq.push(f);
                        if (idx % 2 === 0 && library.jingles.length > 0) seq.push(library.jingles[idx % library.jingles.length]);
                    });
                    if (seq.length > 0) {
                        let total = seq.reduce((a, b) => a + Math.max(1, b.dur), 0);
                        let c = secInDay % (total || 1); 
                        for (let i = 0; i < seq.length; i++) {
                            let itm = seq[i];
                            let idur = Math.max(1, itm.dur);
                            if (c < idur) { 
                                nextItem = itm; seekPos = c; 
                                let n1 = seq[(i + 1) % seq.length];
                                let n2 = seq[(i + 2) % seq.length];
                                urlsSiguientesParaCache.push(n1.src, n2.src);
                                break; 
                            }
                            c -= idur;
                        }
                    }
                }
            }

            if (!isDataLoaded) { 
                nextItem = { src: SILENCE_MP3, title: "Conectando...", artist: "Cargando señal...", img: CONFIG.defaultLogo, type: "loading", dur: 300 }; 
                mode = 'LOADING'; 
            } else if (!nextItem) {
                nextItem = { src: SILENCE_MP3, title: "Radio Maitino", artist: "Emisión Continua", img: CONFIG.defaultLogo, type: "filler", dur: 300 }; 
                mode = 'FILLER';
            }

            currentMode = mode;
            ejecutarAudio(nextItem, seekPos, mode);
            
            if(nextItem && nextItem.src) {
                actualizarPrecarga(nextItem.src, urlsSiguientesParaCache);
                if (urlsSiguientesParaCache.length > 0) {
                    preprocesarIdleDeck(urlsSiguientesParaCache[0]); 
                }
            }
        }

        function isSeekableMode(mode) {
            const unseekable = ['ESTUDIOLIVE', 'LIVE', 'LIVE_FREE', 'LIVE3', 'BREAKING_LIVE'];
            return !unseekable.includes(mode.toUpperCase());
        }

        function gestionarFaders(m, s, ms) {
            let e = s + (ms / 1000);
            
            if (m === 59 || m === 29) { 
                if (e >= 53.0 && e < 57.0) {
                    faderLevel = Math.max(0.0, 1.0 - ((e - 53.0) / 4.0)); 
                } 
                else if (e >= 57.0) { 
                    faderLevel = 0.0; 
                    if (!activeDeck.paused && !['NEWS','SPORTS','LIVE','LIVE_FREE','ESTUDIOLIVE','BREAKING','BREAKING_LIVE','EMERGENCY','ERROR_FALLBACK'].includes(currentMode)) {
                        activeDeck.pause(); 
                    }
                } 
                else {
                    faderLevel = 1.0;
                }
            } 
            else {
                faderLevel = 1.0;
            }

            let bv = userVolume * faderLevel;
            let ns = Date.now() / 1000, ad = (activeDeck === deckA) ? deckA : deckB, fd = (fadingDeck === deckA) ? deckA : deckB;
            
            if (fadingDeck) {
                let fr = fadeOutEndTime - ns;
                if (fr <= 0 || faderLevel === 0.0 || currentCrossfade === 0.0) { 
                    fadingDeck.pause(); 
                    fadingDeck.removeAttribute('src'); 
                    fadingDeck = null; 
                    fd.volume = 0; 
                    ad.volume = Math.max(0, Math.min(1, bv)); 
                } 
                else { 
                    let r = fr / currentCrossfade; 
                    fd.volume = Math.max(0, Math.min(1, bv * r)); 
                    ad.volume = Math.max(0, Math.min(1, bv * (1 - r))); 
                }
            } else { 
                ad.volume = Math.max(0, Math.min(1, bv)); 
            }
        }

        function updateDisplay(item, badgeHtml, badgeClass) {
            let html = '<i class="fas fa-music"></i> RADIO MAITINO';
            let safeBadge = badgeHtml.toUpperCase();
            
            if (safeBadge === 'SILENCE') { safeBadge = 'NEWS'; badgeClass = 'status-badge news'; }
            
            if (safeBadge === 'ESTUDIOLIVE') html = '<i class="fas fa-microphone"></i> ESTUDIO EN DIRECTO';
            else if (safeBadge === 'EMERGENCY') html = '<i class="fas fa-triangle-exclamation"></i> ALERTA TÉCNICA';
            else if (safeBadge === 'BREAKING') html = '<i class="fas fa-bolt"></i> ÚLTIMA HORA';
            else if (safeBadge === 'BREAKING_LIVE') html = '<i class="fas fa-bolt"></i> ÚLTIMA HORA (DIRECTO)';
            else if (safeBadge === 'BREAKING_NEWS' || safeBadge === 'THIRTY_BREAKING_NEWS') html = '<i class="fas fa-bolt"></i> INFORMATIVO URGENTE';
            else if (safeBadge === 'SPECIAL') html = '<i class="fas fa-star"></i> PROGRAMA ESPECIAL';
            else if (safeBadge === 'SPORTS') html = '<i class="fas fa-trophy"></i> DEPORTES';
            else if (safeBadge === 'CHIMES') html = '<i class="fas fa-bell"></i> MEDIANOCHE';
            else if (safeBadge === 'HOUR') html = '<i class="fas fa-clock"></i> SEÑAL HORARIA';
            else if (safeBadge === 'NEWS') html = '<i class="fas fa-globe-europe"></i> BOLETÍN HORARIO';
            else if (safeBadge === 'WEATHER') html = '<i class="fas fa-cloud-sun"></i> EL TIEMPO';
            else if (safeBadge === 'TRAFFIC') html = '<i class="fas fa-car"></i> ESTADO DEL TRÁFICO';
            else if (safeBadge === 'AD') html = '<i class="fas fa-bullhorn"></i> PUBLICIDAD';
            else if (safeBadge === 'JINGLE') html = '<i class="fas fa-wave-square"></i> RADIO MAITINO';
            else if (safeBadge === 'SPACE') html = '<i class="fas fa-comments"></i> ESPACIO DE SERVICIO';
            else if (safeBadge === 'PROMO') html = '<i class="fas fa-star"></i> PROMOCIÓN';
            else if (safeBadge === 'PODCAST') html = '<i class="fas fa-history"></i> DIFERIDO';
            else if (safeBadge === 'INTERVIEW') html = '<i class="fas fa-microphone-lines"></i> ENTREVISTA';
            else if (safeBadge === 'LIVE') html = '<i class="fas fa-satellite-dish"></i> CONEXIÓN EXTERNA';
            else if (safeBadge === 'LIVE_FREE' || safeBadge === 'LIVE3') html = '<i class="fas fa-microphone"></i> CONEXIÓN LIBRE';
            else if (safeBadge === 'SHOW') html = '<i class="fas fa-broadcast-tower"></i> EN DIRECTO';
            else if (safeBadge === 'LOADING') html = '<i class="fas fa-spinner fa-spin"></i> CONECTANDO...';
            else if (safeBadge === 'ERROR_FALLBACK') html = '<i class="fas fa-satellite-dish"></i> FALLO DE RECEPCIÓN';
            else if (safeBadge === 'OFF') html = '<i class="fas fa-moon"></i> FUERA DE ANTENA';

            el.title.innerText = item.title;
            el.sub.innerText = item.artist; el.badge.innerHTML = html; el.badge.className = badgeClass;
            
            let displayImg = item.img || CONFIG.defaultLogo;
            if (displayImg && el.img.src !== displayImg) el.img.src = displayImg;
        }

        function ejecutarAudio(item, seek, mode) {
            let safeMode = mode.toUpperCase();

            if (currentSourceUrl !== item.src) {
                if (isTransitioning) return;
                
                isTransitioning = true;
                currentSourceUrl = item.src; fadingDeck = activeDeck; activeDeck = (activeDeck === deckA) ? deckB : deckA;
                
                activeDeck.onloadedmetadata = null; activeDeck.onloadeddata = null; activeDeck.oncanplay = null;

                if (activeDeck.src !== item.src) {
                    activeDeck.src = item.src || SILENCE_MP3;
                    activeDeck.load();
                }
                
                let rt = Date.now() / 1000;
                let seekApplied = false;

                const aplicarSincronizacion = () => {
                    if (seekApplied) return;
                    if (!isSeekableMode(safeMode)) { seekApplied = true; return; }

                    let delayProcesado = (Date.now() / 1000) - rt; 
                    let adj = seek + delayProcesado; 

                    if (activeDeck.duration && isFinite(activeDeck.duration)) {
                        if (adj >= activeDeck.duration) adj = adj % activeDeck.duration; 
                    }

                    if (adj > 0.05) {
                        try { activeDeck.currentTime = adj; seekApplied = true; } 
                        catch(e) { console.warn("Buffer no listo. Reintentando seek..."); }
                    } else {
                        seekApplied = true;
                    }
                };

                activeDeck.onloadedmetadata = aplicarSincronizacion;
                activeDeck.onloadeddata = aplicarSincronizacion;
                
                activeDeck.oncanplay = () => { 
                    aplicarSincronizacion();
                    isTransitioning = false; 
                    errorCount = 0; 
                    isInEmergencyMode = false;

                    if (['HOUR', 'SILENCE'].includes(safeMode)) {
                        currentCrossfade = 0.0; 
                        fadeOutEndTime = (Date.now() / 1000) + currentCrossfade;
                    } else if (['NEWS', 'CHIMES', 'ESTUDIOLIVE', 'BREAKING', 'BREAKING_LIVE', 'EMERGENCY', 'LIVE', 'ERROR_FALLBACK', 'THIRTY_BREAKING_NEWS', 'BREAKING_NEWS'].includes(safeMode)) {
                        currentCrossfade = 1.0; 
                        fadeOutEndTime = (Date.now() / 1000) + currentCrossfade;
                    } else {
                        currentCrossfade = CONFIG.crossfadeDur; 
                        fadeOutEndTime = (Date.now() / 1000) + currentCrossfade;
                    }
                    safePlay(activeDeck); 
                };

                activeDeck.onerror = () => { isTransitioning = false; manejarError(); }
                if (activeDeck.readyState >= 3) activeDeck.oncanplay();
                
                let formatClass = `status-badge ${item.type || safeMode.toLowerCase()}`;
                updateDisplay(item, safeMode, formatClass);
            } else {
                let ahora = Date.now();
                if (activeDeck.readyState >= 3 && isSeekableMode(safeMode) && !activeDeck.seeking) {
                    let drift = Math.abs(activeDeck.currentTime - seek);
                    if (drift > 2.5 && (ahora - lastDriftCorrection > 8000)) { 
                        try { activeDeck.currentTime = seek; lastDriftCorrection = ahora; } catch(e) {} 
                    }
                }
                if (activeDeck.paused && systemOn && !isTransitioning) safePlay(activeDeck);
            }
        }

        function updateScheduleUI() {
            let spainNow = getSpainTime();
            let d = spainNow.getDay(), curSecs = spainNow.getHours() * 3600 + spainNow.getMinutes() * 60 + spainNow.getSeconds();
            
            let showsToday = (library.schedule[d] || []).slice().sort((a, b) => a.startSecs - b.startSecs);
            let showsTomorrow = (library.schedule[(d + 1) % 7] || []).slice().sort((a, b) => a.startSecs - b.startSecs);
            
            let upcoming = showsToday.filter(s => (s.startSecs + s.dur) > curSecs);
            let combined = upcoming.concat(showsTomorrow);
            let displayShows = combined.slice(0, 3);
            
            let html = '';
            if (displayShows.length === 0) { html = `<div class="schedule-item active"><span>Emisión Continuada</span><span class="time">--:--</span></div>`; } 
            else {
                displayShows.forEach((s, i) => {
                    let title = s.title.split('|')[0].trim();
                    let hh = Math.floor(s.startSecs / 3600), mm = Math.floor((s.startSecs % 3600) / 60);
                    let timeStr = String(hh).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
                    let isActive = (i === 0 && curSecs >= s.startSecs);
                    html += `<div class="schedule-item ${isActive ? 'active' : ''}"><span>${title}</span><span class="time">${timeStr}</span></div>`;
                });
            }
            el.sch.innerHTML = html;
        }

        function visualLoop() { 
            if (systemOn) { 
                let t = getSpainTime(), ssNum = t.getSeconds();
                if (ssNum !== lastClockSec) {
                    let hh = String(t.getHours()).padStart(2, '0'), mm = String(t.getMinutes()).padStart(2, '0'), ss = String(ssNum).padStart(2, '0');
                    el.clock.innerHTML = `${hh}:${mm}:${ss}`;
                    if (ssNum === 0) updateScheduleUI(); 
                    lastClockSec = ssNum;
                }
                
                gestionarFaders(t.getMinutes(), t.getSeconds(), t.getMilliseconds());
                requestAnimationFrame(visualLoop); 
            } 
        }
        
        initSystem();
    </script>
