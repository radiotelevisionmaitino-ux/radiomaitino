<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Maitino | Emisión Profesional</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --broadcast-red: #d0021b; --studio-dark: #111111; --surface: #ffffff;
            --bg-color: #f4f4f7; --text-primary: #1d1d1f; --text-secondary: #86868b;
            --border-subtle: #e5e5ea; --shadow-elevation: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
        }
        body { background-color: var(--bg-color); color: var(--text-primary); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        header { width: 100%; background: var(--surface); padding: 20px 0; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid var(--border-subtle); position: relative; z-index: 10; }
        .brand { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px; }
        .brand span { color: var(--broadcast-red); }
        .tally-light { width: 10px; height: 10px; background-color: #e5e5ea; border-radius: 50%; transition: all 0.5s ease; }
        .tally-light.live { background-color: var(--broadcast-red); box-shadow: 0 0 12px rgba(208, 2, 27, 0.6); }
        .studio-wrapper { width: 100%; max-width: 480px; padding: 40px 20px; display: flex; flex-direction: column; gap: 30px; box-sizing: border-box; }
        .broadcast-card { background: var(--surface); border-radius: 24px; padding: 40px 30px; box-shadow: var(--shadow-elevation); text-align: center; position: relative; overflow: hidden; border: 1px solid #fff; }
        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 100px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; background: #f5f5f7; color: var(--text-secondary); margin-bottom: 25px; transition: all 0.3s ease; }
        
        .status-badge.news { background: #ffe5e5; color: var(--broadcast-red); }
        .status-badge.weather { background: #e0f2fe; color: #0284c7; border: 1px solid #bae6fd; }
        .status-badge.live, .status-badge.breakinglive { background: #e5f0ff; color: #0066cc; }
        .status-badge.ad { background: #fff4e5; color: #cc7a00; }
        .status-badge.jingle { background: #e5ffe5; color: #009900; }
        .status-badge.space { background: #e2e8f0; color: #4a5568; }
        .status-badge.promo { background: #feebc8; color: #dd6b20; }
        .status-badge.podcast { background: #e9d8fd; color: #6b46c1; }
        .status-badge.interview { background: #e6fffa; color: #00b5d8; }
        .status-badge.emergency { background: #fefcbf; color: #d69e2e; }
        .status-badge.off { background: #1a202c; color: #f7fafc; }
        .status-badge.filler { background: #f5f5f7; color: var(--text-secondary); }
        
        /* MODO DEPORTES Y MARCADOR */
        .status-badge.sports { background: #2f855a; color: #f0fff4; border: 1px solid #48bb78; }
        .score-box { display: inline-block; background: #1a202c; color: #68d391; padding: 4px 16px; border-radius: 8px; font-family: 'Inter', sans-serif; font-weight: 800; margin-top: 10px; margin-left: 0; border: 1px solid #2f855a; white-space: nowrap; box-shadow: 0 0 12px rgba(72,187,120,0.15); font-size: 1rem; letter-spacing: 1px; }
        
        .album-art { position: relative; width: 140px; height: 140px; background: #f5f5f7; border-radius: 20px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.03); overflow: hidden; }
        .album-art img { position: absolute; width: 100%; height: 100%; border-radius: 20px; object-fit: cover; z-index: 1; transition: opacity 0.5s ease; opacity: 1; }
        .album-art img.fading { opacity: 0; }
        #visualizer-canvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; z-index: 2; opacity: 0.85; pointer-events: none; }
        
        h2 { margin: 0 0 8px 0; font-size: 1.5rem; letter-spacing: -0.8px; color: var(--text-primary); transition: color 0.3s; line-height: 1.3; }
        p.subtitle { margin: 0 0 30px 0; font-size: 1rem; color: var(--text-secondary); font-weight: 400; transition: color 0.3s; }
        
        /* RELOJ FIJO (Sin parpadeo) */
        .clock-display { font-family: 'JetBrains Mono', monospace; font-size: 2.5rem; font-weight: 700; color: var(--studio-dark); letter-spacing: -2px; margin-bottom: 30px; font-variant-numeric: tabular-nums; }

        .pwr-btn { width: 72px; height: 72px; border-radius: 50%; border: none; background: var(--studio-dark); color: white; font-size: 1.4rem; cursor: pointer; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .pwr-btn:hover { transform: scale(1.05); }
        .pwr-btn:active { transform: scale(0.95); }
        .pwr-btn.active { background: var(--broadcast-red); box-shadow: 0 10px 30px rgba(208, 2, 27, 0.4); }
        
        .volume-control { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 30px; color: var(--text-secondary); }
        input[type=range] { -webkit-appearance: none; width: 120px; height: 4px; background: #e5e5ea; border-radius: 2px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: white; border: 1px solid rgba(0, 0, 0, 0.1); box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15); border-radius: 50%; cursor: pointer; }
        
        .schedule-card { background: var(--surface); border-radius: 20px; padding: 25px; box-shadow: var(--shadow-elevation); }
        .schedule-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; margin-bottom: 20px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 10px; }
        .schedule-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f7; font-size: 0.95rem; color: var(--text-secondary); }
        .schedule-item:last-child { border-bottom: none; }
        .schedule-item.active { color: var(--text-primary); font-weight: 600; }
        .schedule-item.active .time { color: var(--broadcast-red); }
        .time { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>
    <header>
        <div class="brand"><div class="tally-light" id="tally"></div>RADIO MAITINO</div>
    </header>

    <div class="studio-wrapper">
        <div class="broadcast-card">
            <div id="status-badge" class="status-badge">Radio Maitino</div>
            <div class="album-art" id="art">
                <img id="art-img" src="https://ia600602.us.archive.org/32/items/r-maitino-psd-1400.1400/r%20maitino%20psd%201400.1400.png" alt="Radio Maitino">
                <canvas id="visualizer-canvas" width="140" height="60"></canvas>
            </div>
            <h2 id="main-title">Radio Maitino</h2>
            <p class="subtitle" id="sub-title">Sintonizar</p>
            <div class="clock-display" id="clock">--:--:--</div>
            <button class="pwr-btn" id="pwr-btn" onclick="toggleBroadcast()"><i class="fas fa-power-off"></i></button>
            <div class="volume-control">
                <i class="fas fa-volume-down fa-xs"></i>
                <input type="range" min="0" max="1" step="0.01" value="0.9" oninput="userVolume = this.value; if(elLiveAudio && currentMode === 'ESTUDIO_LIVE') elLiveAudio.volume = this.value;">
                <i class="fas fa-volume-up fa-xs"></i>
            </div>
        </div>

        <div class="schedule-card">
            <div class="schedule-title">Parrilla Horaria</div>
            <div id="schedule-list"><div class="schedule-item">Sintonizando...</div></div>
        </div>
    </div>

    <audio id="deck-a" preload="metadata" playsinline></audio>
    <audio id="deck-b" preload="metadata" playsinline></audio>
    <audio id="external-live-audio" autoplay playsinline hidden></audio>

    <script>
        const CONFIG = {
            api: "https://script.google.com/macros/s/AKfycbzoQfFFkwSOoZlnX73FKn8lEtbcRSEe6CYXPeuZ6tZPG5OsBuXivvvGtBJhGJhPC7GU/exec",
            crossfadeDur: 3, pollInterval: 90,
            defaultLogo: "https://ia600602.us.archive.org/32/items/r-maitino-psd-1400.1400/r%20maitino%20psd%201400.1400.png"
        };
        const MASTER_ID = 'maitino-studio-host';
        const SILENCE_MP3 = "data:audio/mpeg;base64,SUQzBAAAAAABEVRYWFgAAAAtAAADY29tbWVudABpRDIzIHYyLjMuMCBhbmQgaWQzIHYyLjQuMCB0YWdzAAAAAAAAAAAA//MkxAAKAAAABpAAAAWSAAAAASU1BTUUzLjk5LjVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV";

        let systemOn = false, userVolume = 0.9, faderLevel = 1.0, currentSourceUrl = "", currentMode = 'FILLER';
        let deckA = document.getElementById('deck-a'), deckB = document.getElementById('deck-b');
        let activeDeck = deckA, fadingDeck = null, fadeOutEndTime = 0, isTransitioning = false; 
        let isDataLoaded = false;
        let visStartTime = Date.now(); 
        
        let peerReceiver = null, externalLiveActive = false, dataConn = null;
        let elLiveAudio = document.getElementById('external-live-audio'); elLiveAudio.muted = true;

        let library = { news: null, chimes: null, weather: null, hours: {}, breaking: null, ads: [], jingles: [], spaces: [], promos: [], filler: [], schedule: {0:[],1:[],2:[],3:[],4:[],5:[],6:[]} };
        let audioCtx, lastPipFired = -1;
        let lastScore = "", lastClockSec = -1, lastScheduleSec = -1; 

        // Sistema del Tiempo Integrado
        let weatherCache = null;
        let isWeatherSpeaking = false;
        let lastWeatherSpeakHour = -1;
        const synth = window.speechSynthesis;

        const el = {
            clock: document.getElementById('clock'), title: document.getElementById('main-title'), sub: document.getElementById('sub-title'), 
            img: document.getElementById('art-img'), badge: document.getElementById('status-badge'), tally: document.getElementById('tally'),
            btn: document.getElementById('pwr-btn'), sch: document.getElementById('schedule-list'), canvas: document.getElementById('visualizer-canvas')
        };

        function safePlay(audioElem) {
            if (!audioElem || !audioElem.src || audioElem.src === window.location.href) return;
            let playPromise = audioElem.play();
            if (playPromise !== undefined) {
                playPromise.catch(err => {
                    console.warn("Autoplay bloqueado o enlace lento. Reintentando...", err);
                    setTimeout(() => { 
                        if (systemOn && audioElem.paused) {
                            audioElem.load(); // Fuerza recarga para asegurar conexión real
                            audioElem.play().catch(e=>console.error("Fallo definitivo de enlace:", audioElem.src)); 
                        }
                    }, 1000);
                });
            }
        }

        function updateBtnState() {
            if (!systemOn) el.btn.innerHTML = '<i class="fas fa-power-off"></i>';
            else if (activeDeck.src && (activeDeck.readyState < 3 && !activeDeck.paused) && !['ESTUDIO_LIVE', 'LIVE', 'BREAKINGLIVE'].includes(currentMode)) el.btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            else el.btn.innerHTML = '<i class="fas fa-stop"></i>';
        }
        [deckA, deckB].forEach(d => { ['waiting','playing','canplay','stalled'].forEach(e => d.addEventListener(e, updateBtnState)); });

        function getSpainTime() {
            let now = new Date();
            let pts = new Intl.DateTimeFormat('en-US', { timeZone: 'Europe/Madrid', year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: false }).formatToParts(now);
            let v = {}; pts.forEach(p => v[p.type] = p.value);
            return new Date(v.year, v.month - 1, v.day, (v.hour === "24" ? 0 : v.hour), v.minute, v.second, now.getMilliseconds());
        }

        async function initSystem() {
            await fetchData(); 
            fetchWeather();
            setInterval(fetchData, CONFIG.pollInterval * 1000); 
            setInterval(fetchWeather, 3600000);
            initPeerReceiver();
            setInterval(() => { if (systemOn && (!dataConn || !dataConn.open)) maintainPersistentConnection(); else if (systemOn && !externalLiveActive) dataConn.send({ command: 'check_live' }); }, 4000);
        }

        async function fetchWeather() {
            try {
                let res = await fetch('https://wttr.in/Maitino?format=j1&lang=es');
                weatherCache = await res.json();
            } catch (e) { console.warn("API Clima inaccesible"); }
        }

        function playWeatherChime() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            let t = audioCtx.currentTime;
            [523.25, 659.25, 783.99].forEach((freq, i) => { 
                let osc = audioCtx.createOscillator(), g = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.value = freq; osc.connect(g); g.connect(audioCtx.destination);
                g.gain.setValueAtTime(0, t + i*0.12); g.gain.linearRampToValueAtTime(userVolume * 0.35, t + i*0.12 + 0.05);
                g.gain.exponentialRampToValueAtTime(0.001, t + i*0.12 + 0.6); osc.start(t + i*0.12); osc.stop(t + i*0.12 + 0.7);
            });
        }

        function triggerWeatherVoice() {
            if(!weatherCache || !systemOn) return;
            let current = weatherCache.current_condition[0];
            let today = weatherCache.weather[0];
            let tomorrow = weatherCache.weather[1];
            let day3 = weatherCache.weather[2];
            let ahora = new Date();
            let hour = ahora.getHours();
            let mins = ahora.getMinutes().toString().padStart(2, '0');
            let dateStr = ahora.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
            
            let faseDia = (hour >= 20 || hour < 6) ? "la noche" : (hour < 13) ? "la mañana" : "la tarde";
            let horaIndex = (hour >= 20 || hour < 2) ? 7 : (hour < 7) ? 1 : (hour < 13) ? 3 : 5;
            
            let condProximasHoras = today.hourly[horaIndex].lang_es[0].value.toLowerCase();
            let condManana = tomorrow.hourly[4].lang_es[0].value.toLowerCase();
            let condDay3 = day3.hourly[4].lang_es[0].value.toLowerCase();
            let nameDay3 = new Date(ahora.getTime() + 86400000 * 2).toLocaleDateString('es-ES', { weekday: 'long' });

            let precipHoy = current.precipMM;
            let probLluviaHoras = today.hourly[horaIndex].chanceofrain;
            let probLluviaManana = tomorrow.hourly[4].chanceofrain;
            let probLluviaDay3 = day3.hourly[4].chanceofrain;

            let guionText = `SERVICIO METEOROLÓGICO DE RADIO MAITINO. Boletín actualizado para hoy, ${dateStr}. Son las ${hour} horas y ${mins} minutos. En este momento, los cielos se presentan ${current.lang_es[0].value.toLowerCase()}s. Los termómetros registran ${current.temp_C} grados, el viento se sitúa en ${current.windspeedKmph} kilómetros por hora y la sensación térmica es de ${current.FeelsLikeC} grados. Humedad del ${current.humidity} por ciento y precipitación acumulada de ${precipHoy} milímetros. De cara a las próximas horas de ${faseDia}, el pronóstico indica condiciones de ${condProximasHoras} con una probabilidad de lluvia del ${probLluviaHoras} por ciento. Las temperaturas alcanzarán hoy un máximo de ${today.maxtempC} grados. Para mañana: prevemos un escenario dominado por ${condManana} con temperaturas entre ${tomorrow.mintempC} y ${tomorrow.maxtempC} grados, y una probabilidad de precipitación del ${probLluviaManana} por ciento. Próximo ${nameDay3}: cielos ${condDay3}s, temperaturas de ${day3.mintempC} a ${day3.maxtempC} grados, y un ${probLluviaDay3} por ciento de probabilidad de lluvia. Es una información de la Agencia Meteorológica de Maitino.`;
            
            synth.cancel();
            let utter = new SpeechSynthesisUtterance(guionText);
            let voices = synth.getVoices();
            let googleVoice = voices.find(v => v.name.includes('Google') && v.lang.includes('es-ES')) || voices.find(v => v.lang.includes('es-ES'));
            if(googleVoice) utter.voice = googleVoice;
            
            utter.rate = 1.15;
            utter.volume = userVolume;

            isWeatherSpeaking = true;
            playWeatherChime(); 
            
            setTimeout(() => { if (systemOn) synth.speak(utter); }, 1000); 

            utter.onend = () => { isWeatherSpeaking = false; playWeatherChime(); }
        }

        function initPeerReceiver() {
            if (peerReceiver && !peerReceiver.destroyed) return;
            peerReceiver = new Peer({ config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }, { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" }, { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" }] } });
            peerReceiver.on('open', () => { if (systemOn) maintainPersistentConnection(); });
            peerReceiver.on('call', call => {
                externalLiveActive = true; call.answer();
                call.on('stream', stream => {
                    elLiveAudio.srcObject = stream; elLiveAudio.muted = true; 
                    safePlay(elLiveAudio);
                });
                call.on('close', () => { externalLiveActive = false; elLiveAudio.srcObject = null; if(systemOn) broadcastLogic(); });
            });
            peerReceiver.on('disconnected', () => peerReceiver.reconnect());
        }

        function maintainPersistentConnection() {
            if (!systemOn || (dataConn && dataConn.open)) return;
            dataConn = peerReceiver.connect(MASTER_ID, { reliable: true });
            dataConn.on('open', () => dataConn.send({ command: 'check_live' }));
            dataConn.on('close', () => { dataConn = null; }); dataConn.on('error', () => { dataConn = null; });
        }

        async function fetchData() {
            try { let res = await fetch(CONFIG.api, { redirect: 'follow' }); let data = await res.json(); processData(data); isDataLoaded = true; updateScheduleUI(); } catch (e) { console.log("API Sync Error"); }
        }

        function addToSchedule(item) {
            let days = []; let s1 = String(item.dayRaw || "").trim();
            if (s1 && s1.toLowerCase() !== "null") {
                s1.split(',').forEach(p => { 
                    if (p.includes('-')) { let l = p.split('-'); for (let i = parseInt(l[0]); i <= parseInt(l[1]); i++) days.push(i); } 
                    else { days.push(parseInt(p)); } 
                });
            }
            if (days.length === 0) days = [0, 1, 2, 3, 4, 5, 6]; 
            
            let s2 = String(item.hourRaw||"").trim(); let startSecs = -1;
            let m = s2.match(/^(\d{1,2}):(\d{2})/);
            if (m) startSecs = parseInt(m[1], 10) * 3600 + parseInt(m[2], 10) * 60;
            
            if(startSecs !== -1) { [...new Set(days)].forEach(d => { if(library.schedule[d]) library.schedule[d].push({ ...item, startSecs: startSecs }); }); }
        }

        function processData(data) {
            library = { news: null, chimes: null, weather: null, hours: {}, breaking: null, ads: [], jingles: [], spaces: [], promos: [], filler: [], schedule: {0:[],1:[],2:[],3:[],4:[],5:[],6:[]} };
            data.forEach(row => {
                if (!row.type || String(row.type).trim() === "") return;
                
                let item = { src: parseLink(row.src), title: row.title || "Emisión", artist: row.artist || "Radio Maitino", img: row.image || "", dur: parseInt(row.duration) || 300, type: row.type.toLowerCase().replace(/\s+/g, ''), dayRaw: row.day, hourRaw: row.hour };
                let t = item.type;

                if (t === 'news') library.news = item; 
                else if (t === 'weather') library.weather = item;
                else if (t === 'chimes') library.chimes = item;
                else if (t === 'space' && !item.hourRaw) library.spaces.push(item);
                else if (t === 'hour') { let m = String(item.hourRaw||"").trim().match(/^(\d{1,2}):(\d{2})/); if(m) library.hours[parseInt(m[1], 10)] = item; else library.hours['default'] = item; } 
                else if (['breaking', 'breakinglive', 'estudiolive', 'emergency'].includes(t)) {
                    if (item.dayRaw || item.hourRaw) { item.type = t === 'emergency' ? 'emergency' : 'estudio_live_scheduled'; addToSchedule(item); } 
                    else { item.type = t === 'emergency' ? 'emergency' : (t.includes('estudio') ? 'estudio_live_breaking' : (t === 'breakinglive' ? 'breakinglive' : 'breaking')); library.breaking = item; }
                }
                else if (t === 'jingle') library.jingles.push(item); else if (t === 'ad') library.ads.push(item);
                else if (t === 'promo') library.promos.push(item);
                else if (['schedule', 'live', 'podcast', 'interview', 'off', 'sports'].includes(t)) {
                    if (item.dayRaw || item.hourRaw) addToSchedule(item); else library.filler.push(item);
                } else { library.filler.push(item); }
            });
        }

        function parseLink(url) { if (!url) return ""; return url.trim(); }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                requestAnimationFrame(drawVisualizer);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function drawVisualizer() {
            if (!systemOn) return; requestAnimationFrame(drawVisualizer);
            if (document.hidden || userVolume <= 0.01) return;

            let ctx = el.canvas.getContext('2d');
            ctx.clearRect(0, 0, el.canvas.width, el.canvas.height);

            let isAudioPlaying = (currentMode === 'ESTUDIO_LIVE' && !elLiveAudio.paused) || (activeDeck && !activeDeck.paused && activeDeck.readyState >= 3) || isWeatherSpeaking;
            let time = (Date.now() - visStartTime) / 150;

            for(let i = 0; i < 32; i++) { 
                let bh = 2; 
                if (isAudioPlaying) {
                    let wave = Math.sin(time + i * 0.2) * Math.cos(time * 0.8 + i * 0.5);
                    bh = Math.max(2, (wave * 0.5 + 0.5) * (Math.random() * 0.5 + 0.5) * 50 * userVolume * faderLevel);
                }
                ctx.fillStyle = 'rgba(208, 2, 27, 0.85)'; 
                ctx.fillRect(i * (140/32), 60 - bh, (140/32)*0.8, bh); 
            }
        }

        function playPip(dur) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let t = audioCtx.currentTime;
            let osc = audioCtx.createOscillator(), pGain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.value = 1000; osc.connect(pGain); pGain.connect(audioCtx.destination);
            pGain.gain.setValueAtTime(0, t);
            pGain.gain.setValueAtTime(userVolume, t + 0.001);
            pGain.gain.setValueAtTime(userVolume, t + dur - 0.001);
            pGain.gain.setValueAtTime(0, t + dur);
            osc.start(t); osc.stop(t + dur + 0.01);
        }

        function playGoalAlert() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            let t = audioCtx.currentTime;
            [800, 1000, 1200].forEach((freq, i) => {
                let osc = audioCtx.createOscillator(), g = audioCtx.createGain();
                osc.type = 'square'; osc.frequency.value = freq; osc.connect(g); g.connect(audioCtx.destination);
                g.gain.setValueAtTime(0, t + i*0.15); g.gain.linearRampToValueAtTime(userVolume * 0.4, t + i*0.15 + 0.02);
                g.gain.linearRampToValueAtTime(0, t + i*0.15 + 0.1); osc.start(t + i*0.15); osc.stop(t + i*0.15 + 0.1);
            });
        }

        function gestionarPips(m, s) {
            let isApproachingHour = (m === 59 || m === 29);
            if (!isApproachingHour && !(m === 0 || m === 30)) { lastPipFired = -1; return; }
            if (isApproachingHour && s >= 55 && s <= 59) {
                if (lastPipFired !== s) { lastPipFired = s; playPip(0.1); }
            } else if ((m === 0 || m === 30) && s === 0) {
                if (lastPipFired !== s) { lastPipFired = s; playPip(0.5); }
            }
        }

        let broadcastLoopTimer = null;
        function toggleBroadcast() {
            if (!systemOn) {
                initAudio(); 
                visStartTime = Date.now(); 
                deckA.src = SILENCE_MP3; safePlay(deckA); deckB.src = SILENCE_MP3; safePlay(deckB); elLiveAudio.src = SILENCE_MP3; safePlay(elLiveAudio);
                systemOn = true; el.btn.classList.add('active'); el.tally.classList.add('live'); updateBtnState(); requestAnimationFrame(visualLoop); 
                synth.getVoices();
                function loop() { if (systemOn) { broadcastLogic(); broadcastLoopTimer = setTimeout(loop, 50); } }
                loop();
            } else {
                systemOn = false; el.btn.classList.remove('active'); el.tally.classList.remove('live'); updateBtnState();
                clearTimeout(broadcastLoopTimer); synth.cancel(); isWeatherSpeaking = false;
                activeDeck.pause(); activeDeck.removeAttribute('src'); activeDeck.load();
                if (fadingDeck) { fadingDeck.pause(); fadingDeck.removeAttribute('src'); fadingDeck.load(); fadingDeck = null; }
                currentSourceUrl = ""; elLiveAudio.muted = true;
                if(dataConn) { dataConn.close(); dataConn = null; }
                updateDisplay({ title: "Emisión Detenida", artist: "Off Air", img: "" }, '<i class="fas fa-power-off"></i> OFF', "status-badge off");
                el.canvas.getContext('2d').clearRect(0, 0, el.canvas.width, el.canvas.height);
            }
        }

        function broadcastLogic() {
            if (!systemOn) return;
            const now = getSpainTime(), d = now.getDay(), h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();
            const secInDay = h * 3600 + m * 60 + s, secInHour = m * 60 + s;
            
            gestionarFaders(m, s, ms); gestionarPips(m, s);

            if (s === lastScheduleSec) return;
            lastScheduleSec = s;

            let nextItem = null, seekPos = 0, mode = 'FILLER';
            
            let curH = (h === 0) ? library.chimes : (library.hours[h] || library.hours['default']);
            
            let tohSeq = [];
            if (curH) tohSeq.push({...curH, computedMode: 'HOUR'});
            if (library.news) tohSeq.push({...library.news, computedMode: 'NEWS'});
            if (library.weather) tohSeq.push({...library.weather, dur: 60, computedMode: 'WEATHER'}); 

            let transSeq = [];
            let rawTrans = [];
            library.spaces.forEach(x => rawTrans.push(x));
            library.promos.forEach(x => rawTrans.push(x));
            library.ads.forEach(x => rawTrans.push(x));
            if (library.jingles.length > 0) rawTrans.push(library.jingles[h % library.jingles.length]);

            let seed = h + (d * 24);
            function sRand() { let x = Math.sin(seed++) * 10000; return x - Math.floor(x); }
            rawTrans.sort(() => sRand() - 0.5);

            for (let i = 0; i < rawTrans.length; i++) {
                transSeq.push({...rawTrans[i], computedMode: rawTrans[i].type.toUpperCase()});
                let sDur = sRand() > 0.5 ? 2 : 1;
                // Sustituido el marcador visual de 'PAUSA' por un modo 'FILLER' silencioso e invisible.
                transSeq.push({ src: SILENCE_MP3, title: "Radio Maitino", artist: "Radio Maitino", img: CONFIG.defaultLogo, type: "filler", dur: sDur, computedMode: 'FILLER' });
            }
            
            tohSeq.push(...transSeq);
            let blockDur = tohSeq.reduce((a, b) => a + Math.max(1, b.dur), 0);

            let scheduledShow = (library.schedule[d] || []).find(sh => secInDay >= sh.startSecs && secInDay < sh.startSecs + sh.dur);

            // ORDEN DE PRIORIDAD CORREGIDO:
            // 1. Alertas de Última Hora
            if (library.breaking) {
                if (library.breaking.type === 'estudio_live_breaking' && externalLiveActive) { 
                    nextItem = library.breaking; mode = 'ESTUDIO_LIVE'; 
                } else if (library.breaking.type === 'breakinglive') { 
                    nextItem = library.breaking; mode = 'BREAKINGLIVE'; seekPos = 0; 
                } else { 
                    nextItem = library.breaking; seekPos = (Math.floor(Date.now() / 1000)) % Math.max(1, library.breaking.dur); mode = 'BREAKING'; 
                }
            }
            // 2. Bloque Horario (Noticias, Tiempo, Publicidad) TIENE PRIORIDAD sobre la programación en directo.
            else if (secInHour < blockDur) {
                let c = secInHour;
                for (let itm of tohSeq) { 
                    let idur = Math.max(1, itm.dur);
                    if (c < idur) { nextItem = itm; seekPos = c; mode = itm.computedMode; break; } 
                    c -= idur; 
                }
            }
            // 3. Programación Parrilla (El programa empezará tras la publicidad exactamente desde el 00, sin perderse)
            else if (scheduledShow) {
                let delay = (scheduledShow.startSecs % 3600 === 0) ? blockDur : 0;
                nextItem = scheduledShow; 
                seekPos = Math.max(0, (secInDay - scheduledShow.startSecs) - delay); 
                
                if (scheduledShow.type.includes('estudio')) mode = 'ESTUDIO_LIVE';
                else if (scheduledShow.type === 'sports') mode = 'SPORTS';
                else if (scheduledShow.type.includes('live')) mode = 'LIVE';
                else mode = 'SHOW';
            }
            // 4. Música de Relleno
            else {
                mode = 'FILLER'; let seq = []; library.filler.forEach((f, idx) => { seq.push(f); if (idx % 2 === 0 && library.jingles.length > 0) seq.push(library.jingles[idx % library.jingles.length]); });
                if (seq.length > 0) {
                    let total = seq.reduce((a, b) => a + Math.max(1, b.dur), 0), c = secInDay % (total || 1);
                    for (let itm of seq) { let idur = Math.max(1, itm.dur); if (c < idur) { nextItem = itm; seekPos = c; break; } c -= idur; }
                }
            }

            if (!isDataLoaded) { nextItem = { src: SILENCE_MP3, title: "Conectando...", artist: "Sintonizando emisión...", img: CONFIG.defaultLogo, type: "loading", dur: 300 }; mode = 'LOADING'; }
            else if (!nextItem) { nextItem = { src: SILENCE_MP3, title: "Emisión Continuada", artist: "Silencio", img: CONFIG.defaultLogo, type: "off", dur: 300 }; mode = 'OFF'; }

            currentMode = mode; if (nextItem) ejecutarAudio(nextItem, seekPos, mode);
        }

        function gestionarFaders(m, s, ms) {
            let e = s + (ms / 1000);
            if (m === 59) { if (e >= 54 && e < 59) faderLevel = 1.0 - ((e - 54) / 5); else if (e >= 59) { faderLevel = 0.0; if (!activeDeck.paused && !['LIVE','ESTUDIO_LIVE','NEWS','SPORTS','BREAKINGLIVE'].includes(currentMode)) activeDeck.pause(); } else faderLevel = 1.0; } 
            else if (m === 0) faderLevel = 1.0; else if (m === 29 && e >= 55) faderLevel = 1.0 - (0.4 * ((e - 55) / 5)); else if (m === 30 && e < 3) faderLevel = 0.6 + (0.4 * (e / 3)); else faderLevel = 1.0;

            let bv = userVolume * faderLevel;
            if (isWeatherSpeaking) bv = bv * 0.25;

            if (currentMode === 'ESTUDIO_LIVE') {
                elLiveAudio.muted = false; elLiveAudio.volume = userVolume;
                deckA.volume = 0; deckB.volume = 0;
                if(!activeDeck.paused) activeDeck.pause();
                if(elLiveAudio.paused && externalLiveActive) safePlay(elLiveAudio);
            } else {
                elLiveAudio.muted = true;  
                let ns = Date.now() / 1000, ad = (activeDeck === deckA) ? deckA : deckB, fd = (fadingDeck === deckA) ? deckA : deckB;
                
                if (fadingDeck) {
                    let fr = fadeOutEndTime - ns;
                    if (fr <= 0 || faderLevel === 0.0) { fadingDeck.pause(); fadingDeck.removeAttribute('src'); fadingDeck = null; fd.volume = 0; ad.volume = Math.max(0, Math.min(1, bv)); } 
                    else { let r = fr / CONFIG.crossfadeDur; fd.volume = Math.max(0, Math.min(1, bv * r)); ad.volume = Math.max(0, Math.min(1, bv * (1 - r))); }
                } else { ad.volume = Math.max(0, Math.min(1, bv)); }
            }
        }

        function updateDisplay(item, badgeHtml, badgeClass) {
            let html = '<i class="fas fa-music"></i> RADIO MAITINO';
            if (badgeHtml === 'ESTUDIO_LIVE') html = '<i class="fas fa-microphone"></i> ESTUDIO EN DIRECTO';
            else if (badgeHtml === 'SPORTS') html = '<i class="fas fa-trophy"></i> DEPORTES';
            else if (badgeHtml === 'BREAKING') html = '<i class="fas fa-bolt"></i> ÚLTIMA HORA';
            else if (badgeHtml === 'BREAKINGLIVE') html = '<i class="fas fa-satellite-dish"></i> ÚLTIMA HORA DIRECTO';
            else if (badgeHtml === 'CHIMES') html = '<i class="fas fa-bell"></i> MEDIANOCHE';
            else if (badgeHtml === 'HOUR') html = '<i class="fas fa-clock"></i> SEÑAL HORARIA';
            else if (badgeHtml === 'NEWS') html = '<i class="fas fa-globe-europe"></i> BOLETÍN HORARIO';
            else if (badgeHtml === 'WEATHER') html = '<i class="fas fa-cloud-sun"></i> EL TIEMPO';
            else if (badgeHtml === 'LIVE') html = '<i class="fas fa-satellite-dish"></i> CONEXIÓN EXTERNA';
            else if (badgeHtml === 'AD') html = '<i class="fas fa-bullhorn"></i> PUBLICIDAD';
            else if (badgeHtml === 'JINGLE') html = '<i class="fas fa-wave-square"></i> RADIO MAITINO';
            else if (badgeHtml === 'SPACE') html = '<i class="fas fa-comments"></i> ESPACIO DE SERVICIO';
            else if (badgeHtml === 'PROMO') html = '<i class="fas fa-star"></i> PROMOCIÓN';
            else if (badgeHtml === 'PODCAST') html = '<i class="fas fa-history"></i> DIFERIDO';
            else if (badgeHtml === 'INTERVIEW') html = '<i class="fas fa-microphone-lines"></i> ENTREVISTA';
            else if (badgeHtml === 'EMERGENCY') html = '<i class="fas fa-triangle-exclamation"></i> ALERTA TÉCNICA';
            else if (badgeHtml === 'SHOW') html = '<i class="fas fa-broadcast-tower"></i> EN DIRECTO';
            else if (badgeHtml === 'LOADING') html = '<i class="fas fa-spinner fa-spin"></i> CONECTANDO...';
            else if (badgeHtml === 'OFF') html = 'FUERA DE ANTENA';
            // El modo FILLER (que ahora usan los pequeños silencios intermedios) usa por defecto el logo y texto principal "RADIO MAITINO".

            if (badgeHtml === 'SPORTS' || item.type === 'sports') {
                let parts = item.title.split('|'); let main = parts[0].trim(); let score = parts[1] ? `<br><span class="score-box">${parts[1].trim()}</span>` : '';
                el.title.innerHTML = main + score;
            } else { el.title.innerText = item.title; }

            el.sub.innerText = item.artist; el.badge.innerHTML = html; el.badge.className = badgeClass;
            if (item.img && el.img.src !== item.img) { el.img.src = item.img; }
        }

        function ejecutarAudio(item, seek, mode) {
            let safeMode = mode.toUpperCase();
            
            if (safeMode === 'WEATHER') {
                let d = new Date();
                if (lastWeatherSpeakHour !== d.getHours() && seek < 10) { 
                    triggerWeatherVoice(); 
                    lastWeatherSpeakHour = d.getHours(); 
                }
            } else {
                if (isWeatherSpeaking) { synth.cancel(); isWeatherSpeaking = false; }
            }

            if (currentSourceUrl !== item.src) {
                currentSourceUrl = item.src; fadingDeck = activeDeck; activeDeck = (activeDeck === deckA) ? deckB : deckA;
                
                activeDeck.src = item.src; 
                let rt = Date.now() / 1000;
                let isStream = ['LIVE','ESTUDIO_LIVE','SPORTS','BREAKINGLIVE'].includes(safeMode);
                
                activeDeck.onloadedmetadata = () => { 
                    let adj = seek + ((Date.now() / 1000) - rt); 
                    if (!isStream && adj > 2 && (!activeDeck.duration || adj < activeDeck.duration)) {
                        try { activeDeck.currentTime = adj; } catch(e) { console.warn("Bloqueo de seek."); }
                    }
                };
                
                activeDeck.oncanplay = () => { 
                    isTransitioning = false; 
                    if (safeMode === 'NEWS') {
                        fadeOutEndTime = Date.now() / 1000; // Sin fundido al entrar a NEWS, corta directo 
                    } else {
                        fadeOutEndTime = (Date.now() / 1000) + CONFIG.crossfadeDur; 
                    }
                    safePlay(activeDeck); 
                };
                activeDeck.load();
                updateDisplay(item, safeMode, `status-badge ${item.type || safeMode.toLowerCase()}`);
            } else {
                let isStream = ['LIVE','ESTUDIO_LIVE','SPORTS','BREAKINGLIVE'].includes(safeMode);
                if (activeDeck.readyState >= 3 && !isStream) {
                    if (Math.abs(activeDeck.currentTime - seek) > 15) {
                        try { activeDeck.currentTime = seek; } catch(e) {}
                    }
                }
                if (activeDeck.paused && systemOn && !isTransitioning) safePlay(activeDeck);
            }
        }

        function updateScheduleUI() {
            let spainNow = getSpainTime();
            let d = spainNow.getDay(), curSecs = spainNow.getHours() * 3600 + spainNow.getMinutes() * 60 + spainNow.getSeconds();

            let showsToday = (library.schedule[d] || []).slice().sort((a, b) => a.startSecs - b.startSecs);
            let showsTomorrow = (library.schedule[(d + 1) % 7] || []).slice().sort((a, b) => a.startSecs - b.startSecs);
            
            let upcoming = showsToday.filter(s => (s.startSecs + s.dur) > curSecs);
            let combined = upcoming.concat(showsTomorrow);
            let displayShows = combined.slice(0, 3);
            
            let html = '';
            if (displayShows.length === 0) {
                html = `<div class="schedule-item active"><span>Emisión Continuada</span><span class="time">--:--</span></div>`;
            } else {
                displayShows.forEach((s, i) => {
                    let title = s.title.split('|')[0].trim();
                    let hh = Math.floor(s.startSecs / 3600), mm = Math.floor((s.startSecs % 3600) / 60);
                    let timeStr = String(hh).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
                    let isActive = (i === 0 && curSecs >= s.startSecs);
                    html += `<div class="schedule-item ${isActive ? 'active' : ''}"><span>${title}</span><span class="time">${timeStr}</span></div>`;
                });
            }
            el.sch.innerHTML = html;
        }

        function visualLoop() { 
            if (systemOn) { 
                let t = getSpainTime(), ssNum = t.getSeconds();
                if (ssNum !== lastClockSec) {
                    let hh = String(t.getHours()).padStart(2, '0'), mm = String(t.getMinutes()).padStart(2, '0'), ss = String(ssNum).padStart(2, '0');
                    el.clock.innerHTML = `${hh}:${mm}:${ss}`;
                    if (ssNum === 0) updateScheduleUI(); 
                    lastClockSec = ssNum;
                }
                requestAnimationFrame(visualLoop); 
            } 
        }

        initSystem();
    </script>
