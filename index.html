<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Maitino | Emisión Profesional Unificada</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --broadcast-red: #d0021b; --studio-dark: #111111; --surface: #ffffff;
            --bg-color: #f4f4f7; --text-primary: #1d1d1f; --text-secondary: #86868b;
            --border-subtle: #e5e5ea; --shadow-elevation: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
        }
        body { background-color: var(--bg-color); color: var(--text-primary); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        header { width: 100%; background: var(--surface); padding: 20px 0; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid var(--border-subtle); position: relative; z-index: 10; }
        .brand { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px; }
        .brand span { color: var(--broadcast-red); }
        .tally-light { width: 10px; height: 10px; background-color: #e5e5ea; border-radius: 50%; transition: all 0.5s ease; }
        .tally-light.live { background-color: var(--broadcast-red); box-shadow: 0 0 12px rgba(208, 2, 27, 0.6); }
        .studio-wrapper { width: 100%; max-width: 480px; padding: 40px 20px; display: flex; flex-direction: column; gap: 30px; box-sizing: border-box; }
        .broadcast-card { background: var(--surface); border-radius: 24px; padding: 40px 30px; box-shadow: var(--shadow-elevation); text-align: center; position: relative; overflow: hidden; border: 1px solid #fff; }
        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 100px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; background: #f5f5f7; color: var(--text-secondary); margin-bottom: 25px; transition: all 0.3s ease; }
        
        /* Paleta de colores para jerarquías */
        .status-badge.estudiolive { background: var(--broadcast-red); color: white; box-shadow: 0 4px 10px rgba(208,2,27,0.3); }
        .status-badge.breaking, .status-badge.breakinglive, .status-badge.breaking_news, .status-badge.thirty_breaking_news { background: #ff003c; color: white; font-weight: 800; }
        .status-badge.special { background: #6b46c1; color: white; }
        .status-badge.news { background: #ffe5e5; color: var(--broadcast-red); }
        .status-badge.weather { background: #e0f2fe; color: #0284c7; border: 1px solid #bae6fd; }
        .status-badge.traffic { background: #feebc8; color: #dd6b20; border: 1px solid #fbd38d; }
        .status-badge.live { background: #e5f0ff; color: #0066cc; }
        .status-badge.ad { background: #fff4e5; color: #cc7a00; }
        .status-badge.jingle { background: #e5ffe5; color: #009900; }
        .status-badge.space { background: #e2e8f0; color: #4a5568; }
        .status-badge.promo { background: #feebc8; color: #dd6b20; }
        .status-badge.podcast { background: #e9d8fd; color: #6b46c1; }
        .status-badge.interview { background: #e6fffa; color: #00b5d8; }
        .status-badge.emergency { background: #fefcbf; color: #d69e2e; }
        .status-badge.off { background: #1a202c; color: #f7fafc; }
        .status-badge.filler { background: #f5f5f7; color: var(--text-secondary); }
        .status-badge.silence { background: #f5f5f7; color: var(--text-secondary); opacity: 0.5; }
        
        .status-badge.sports { background: #2f855a; color: #f0fff4; border: 1px solid #48bb78; }
        .score-box { display: inline-block; background: #1a202c; color: #68d391; padding: 4px 16px; border-radius: 8px; font-family: 'Inter', sans-serif; font-weight: 800; margin-top: 10px; margin-left: 0; border: 1px solid #2f855a; white-space: nowrap; box-shadow: 0 0 12px rgba(72,187,120,0.15); font-size: 1rem; letter-spacing: 1px; }
        
        .album-art { position: relative; width: 140px; height: 140px; background: #f5f5f7; border-radius: 20px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.03); overflow: hidden; }
        .album-art img { position: absolute; width: 100%; height: 100%; border-radius: 20px; object-fit: cover; z-index: 1; }
        #visualizer-canvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; z-index: 2; opacity: 0.85; pointer-events: none; }
        
        h2 { margin: 0 0 8px 0; font-size: 1.5rem; letter-spacing: -0.8px; color: var(--text-primary); transition: color 0.3s; line-height: 1.3; }
        p.subtitle { margin: 0 0 30px 0; font-size: 1rem; color: var(--text-secondary); font-weight: 400; transition: color 0.3s; }
        
        .clock-display { font-family: 'JetBrains Mono', monospace; font-size: 2.5rem; font-weight: 700; color: var(--studio-dark); letter-spacing: -2px; margin-bottom: 30px; font-variant-numeric: tabular-nums; }

        .pwr-btn { width: 72px; height: 72px; border-radius: 50%; border: none; background: var(--studio-dark); color: white; font-size: 1.4rem; cursor: pointer; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .pwr-btn:hover { transform: scale(1.05); }
        .pwr-btn:active { transform: scale(0.95); }
        .pwr-btn.active { background: var(--broadcast-red); box-shadow: 0 10px 30px rgba(208, 2, 27, 0.4); }
        
        .volume-control { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 30px; color: var(--text-secondary); }
        input[type=range] { -webkit-appearance: none; width: 120px; height: 4px; background: #e5e5ea; border-radius: 2px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: white; border: 1px solid rgba(0, 0, 0, 0.1); box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15); border-radius: 50%; cursor: pointer; }
        
        .schedule-card { background: var(--surface); border-radius: 20px; padding: 25px; box-shadow: var(--shadow-elevation); }
        .schedule-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; margin-bottom: 20px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 10px; }
        .schedule-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f7; font-size: 0.95rem; color: var(--text-secondary); }
        .schedule-item:last-child { border-bottom: none; }
        .schedule-item.active { color: var(--text-primary); font-weight: 600; }
        .schedule-item.active .time { color: var(--broadcast-red); }
        .time { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
    </style>
</head>

<body>
    <header>
        <div class="brand"><div class="tally-light" id="tally"></div>RADIO MAITINO</div>
    </header>

    <div class="studio-wrapper">
        <div class="broadcast-card">
            <div id="status-badge" class="status-badge">Radio Maitino</div>
            <div class="album-art" id="art">
                <img id="art-img" src="https://ia600602.us.archive.org/32/items/r-maitino-psd-1400.1400/r%20maitino%20psd%201400.1400.png" alt="Radio Maitino">
                <canvas id="visualizer-canvas" width="140" height="60"></canvas>
            </div>
            <h2 id="main-title">Radio Maitino</h2>
            <p class="subtitle" id="sub-title">Sintonizar</p>
            <div class="clock-display" id="clock">--:--:--</div>
            <button class="pwr-btn" id="pwr-btn" onclick="toggleBroadcast()"><i class="fas fa-power-off"></i></button>
            <div class="volume-control">
                <i class="fas fa-volume-down fa-xs"></i>
                <input type="range" min="0" max="1" step="0.01" value="0.9" oninput="updateVolume(this.value)">
                <i class="fas fa-volume-up fa-xs"></i>
            </div>
        </div>

        <div class="schedule-card">
            <div class="schedule-title">Parrilla Horaria</div>
            <div id="schedule-list"><div class="schedule-item">Sintonizando...</div></div>
        </div>
    </div>

    <audio id="deck-a" crossorigin="anonymous" preload="auto" playsinline></audio>
    <audio id="deck-b" crossorigin="anonymous" preload="auto" playsinline></audio>

    <script>
        const CONFIG = {
            api: "https://script.google.com/macros/s/AKfycbzoQfFFkwSOoZlnX73FKn8lEtbcRSEe6CYXPeuZ6tZPG5OsBuXivvvGtBJhGJhPC7GU/exec",
            crossfadeDur: 3, pollInterval: 90,
            defaultLogo: "https://ia600602.us.archive.org/32/items/r-maitino-psd-1400.1400/r%20maitino%20psd%201400.1400.png"
        };
        const SILENCE_MP3 = "data:audio/mpeg;base64,SUQzBAAAAAABEVRYWFgAAAAtAAADY29tbWVudABpRDIzIHYyLjMuMCBhbmQgaWQzIHYyLjQuMCB0YWdzAAAAAAAAAAAA//MkxAAKAAAABpAAAAWSAAAAASU1BTUUzLjk5LjVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV";

        let systemOn = false, userVolume = 0.9, faderLevel = 1.0, currentSourceUrl = "", currentMode = 'FILLER';
        let currentCrossfade = CONFIG.crossfadeDur;
        
        let deckA = document.getElementById('deck-a'), deckB = document.getElementById('deck-b');
        let activeDeck = deckA, fadingDeck = null, fadeOutEndTime = 0, isTransitioning = false; 
        let isDataLoaded = false;
        let visStartTime = Date.now(); 
        
        let library = { news: null, thirty_news: null, breaking_news: null, chimes: null, weather: null, traffic: null, hours: {}, breaking: null, ads: [], jingles: [], spaces: [], promos: [], filler: [], schedule: {0:[],1:[],2:[],3:[],4:[],5:[],6:[]}, scheduleDates: {} };
        
        // CIRUGÍA: Variables nuevas para el compresor
        let audioCtx, compressor, sourceA, sourceB, lastPipFired = -1, lastPreloadedMin = -1;
        let lastClockSec = -1, lastScheduleSec = -1; 

        const el = {
            clock: document.getElementById('clock'), title: document.getElementById('main-title'), sub: document.getElementById('sub-title'), 
            img: document.getElementById('art-img'), badge: document.getElementById('status-badge'), tally: document.getElementById('tally'),
            btn: document.getElementById('pwr-btn'), sch: document.getElementById('schedule-list'), canvas: document.getElementById('visualizer-canvas')
        };

        function updateVolume(val) {
            userVolume = val;
            if (activeDeck) activeDeck.volume = userVolume * faderLevel;
        }

        function safePlay(audioElem) {
            if (!audioElem || !audioElem.src || audioElem.src === window.location.href) return;
            let playPromise = audioElem.play();
            if (playPromise !== undefined) {
                playPromise.catch(err => {
                    console.warn("Autoplay bloqueado. Reintentando...", err);
                    setTimeout(() => { if (systemOn && audioElem.paused) audioElem.play().catch(e=>{}); }, 1000);
                });
            }
        }

        function updateBtnState() {
            if (!systemOn) el.btn.innerHTML = '<i class="fas fa-power-off"></i>';
            else if (activeDeck.src && (activeDeck.readyState < 3 && !activeDeck.paused) && !['ESTUDIOLIVE', 'LIVE', 'BREAKINGLIVE'].includes(currentMode)) el.btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            else el.btn.innerHTML = '<i class="fas fa-stop"></i>';
        }

        [deckA, deckB].forEach(d => { ['waiting','playing','canplay','stalled'].forEach(e => d.addEventListener(e, updateBtnState)); });

        function getSpainTime() {
            let now = new Date();
            let pts = new Intl.DateTimeFormat('en-US', { timeZone: 'Europe/Madrid', year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: false }).formatToParts(now);
            let v = {}; pts.forEach(p => v[p.type] = p.value);
            return new Date(v.year, v.month - 1, v.day, (v.hour === "24" ? 0 : v.hour), v.minute, v.second, now.getMilliseconds());
        }

        function parseAndRotateLink(url) { 
            if (!url) return ""; 
            let trimmed = url.trim();
            let urlList = trimmed.split('|'); 
            if (urlList.length > 1) {
                let now = getSpainTime();
                let start = new Date(now.getFullYear(), 0, 0);
                let diff = (now - start) + ((start.getTimezoneOffset() - now.getTimezoneOffset()) * 60000);
                let dayOfYear = Math.floor(diff / 86400000);
                let selectedIndex = dayOfYear % urlList.length;
                return urlList[selectedIndex].trim();
            }
            return trimmed; 
        }

        async function initSystem() {
            await fetchData(); 
            setInterval(fetchData, CONFIG.pollInterval * 1000); 
        }

        async function fetchData() {
            try { 
                let res = await fetch(CONFIG.api, { redirect: 'follow' }); 
                let data = await res.json(); 
                processData(data); 
                isDataLoaded = true; 
                updateScheduleUI(); 
                updateDynamicDurations(); 
            } catch (e) { console.log("API Sync Error"); }
        }

        function updateDynamicDurations() {
            let itemsToSync = [library.news, library.thirty_news, library.breaking_news, library.chimes, library.weather, library.traffic];
            if (library.hours) Object.values(library.hours).forEach(h => itemsToSync.push(h));

            itemsToSync.forEach(item => {
                if (item && item.src) {
                    let temp = new Audio();
                    temp.preload = "metadata";
                    temp.src = item.src;
                    temp.onloadedmetadata = () => { if (temp.duration && isFinite(temp.duration)) item.dur = Math.ceil(temp.duration); };
                }
            });
        }

        function addToSchedule(item) {
            let s1 = String(item.dayRaw || "").trim(), s2 = String(item.hourRaw || "").trim(), startSecs = -1;
            let m = s2.match(/^(\d{1,2}):(\d{2})/);
            if (m) startSecs = parseInt(m[1], 10) * 3600 + parseInt(m[2], 10) * 60;
            if (startSecs === -1) return;
            item.startSecs = startSecs;

            if (s1.includes('/')) {
                let parts = s1.split('/');
                if (parts.length === 3) {
                    let y = parts[2].length === 2 ? "20" + parts[2] : parts[2];
                    let normDate = parseInt(parts[0], 10) + "/" + parseInt(parts[1], 10) + "/" + y;
                    if(!library.scheduleDates) library.scheduleDates = {};
                    if(!library.scheduleDates[normDate]) library.scheduleDates[normDate] = [];
                    library.scheduleDates[normDate].push(item);
                }
                return; 
            }

            let days = []; 
            if (s1 && s1.toLowerCase() !== "null") {
                s1.split(',').forEach(p => { 
                    if (p.includes('-')) { let l = p.split('-'); for (let i = parseInt(l[0]); i <= parseInt(l[1]); i++) days.push(i); } 
                    else { days.push(parseInt(p)); } 
                });
            }
            if (days.length === 0) days = [0, 1, 2, 3, 4, 5, 6]; 
            [...new Set(days)].forEach(d => { if(library.schedule[d]) library.schedule[d].push(item); });
        }

        function processData(data) {
            library = { news: null, thirty_news: null, breaking_news: null, chimes: null, weather: null, traffic: null, hours: {}, breaking: null, ads: [], jingles: [], spaces: [], promos: [], filler: [], schedule: {0:[],1:[],2:[],3:[],4:[],5:[],6:[]}, scheduleDates: {} };
            data.forEach(row => {
                if (!row.type || String(row.type).trim() === "") return;
                let rawType = row.type.toLowerCase().replace(/\s+/g, '');
                
                let isFillerType = !row.hour && !['news','thirty_breaking_news','breaking_news','weather','traffic','chimes','hour','breaking','breakinglive','estudiolive','emergency','jingle','ad','promo','schedule','live','special','podcast','interview','off','sports','space'].includes(rawType);
                
                let urls = [];
                if (isFillerType && row.src && row.src.includes('|')) {
                    urls = row.src.split('|').map(u => u.trim()).filter(u => u !== "");
                } else {
                    urls = [parseAndRotateLink(row.src)];
                }

                urls.forEach((url, idx) => {
                    let item = { 
                        src: url, 
                        title: row.title || "Emisión", 
                        artist: row.artist || "Radio Maitino", 
                        img: row.image || "", 
                        dur: parseInt(row.duration) || (isFillerType ? 2400 : 300), 
                        type: rawType, 
                        dayRaw: row.day, 
                        hourRaw: row.hour 
                    };
                    let t = item.type;

                    if (t === 'news') library.news = item; 
                    else if (t === 'thirty_breaking_news') library.thirty_news = item;
                    else if (t === 'breaking_news') library.breaking_news = item;
                    else if (t === 'weather') library.weather = item;
                    else if (t === 'traffic') library.traffic = item;
                    else if (t === 'chimes') library.chimes = item;
                    else if (t === 'space' && !item.hourRaw) library.spaces.push(item);
                    else if (t === 'hour') { let m = String(item.hourRaw||"").trim().match(/^(\d{1,2}):(\d{2})/); if(m) library.hours[parseInt(m[1], 10)] = item; else library.hours['default'] = item; } 
                    else if (['breaking', 'breakinglive', 'estudiolive', 'emergency'].includes(t)) {
                        if (item.dayRaw || item.hourRaw) { item.type = t; addToSchedule(item); } 
                        else { item.type = t; library.breaking = item; }
                    }
                    else if (t === 'jingle') library.jingles.push(item); else if (t === 'ad') library.ads.push(item);
                    else if (t === 'promo') library.promos.push(item);
                    else if (['schedule', 'live', 'special', 'podcast', 'interview', 'off', 'sports'].includes(t)) {
                        if (item.dayRaw || item.hourRaw) addToSchedule(item); else library.filler.push(item);
                    } else { library.filler.push(item); }
                });
            });
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                
                // --- INICIO CIRUGÍA COMPRESOR UNIVERSAL ---
                compressor = audioCtx.createDynamicsCompressor();
                compressor.threshold.value = -24; // Empieza a regular a partir de -24dB
                compressor.knee.value = 30;       // Curva de transición suave (evita saltos)
                compressor.ratio.value = 12;      // Grado de nivelación (12:1 es óptimo para broadcast)
                compressor.attack.value = 0.003;  // Acción ultrarrápida (3 milisegundos)
                compressor.release.value = 0.25;  // Retorno natural (250 milisegundos)
                compressor.connect(audioCtx.destination); // Enviar al destino final

                // Conectar Deck A y Deck B al compresor en lugar de directo a los altavoces
                sourceA = audioCtx.createMediaElementSource(deckA);
                sourceB = audioCtx.createMediaElementSource(deckB);
                
                sourceA.connect(compressor);
                sourceB.connect(compressor);
                // --- FIN CIRUGÍA COMPRESOR UNIVERSAL ---
                
                requestAnimationFrame(drawVisualizer);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function drawVisualizer() {
            if (!systemOn) return; requestAnimationFrame(drawVisualizer);
            if (document.hidden || userVolume <= 0.01) return;

            let ctx = el.canvas.getContext('2d');
            ctx.clearRect(0, 0, el.canvas.width, el.canvas.height);

            let isAudioPlaying = (activeDeck && !activeDeck.paused && activeDeck.readyState >= 3);
            let time = (Date.now() - visStartTime) / 150;

            for(let i = 0; i < 32; i++) { 
                let bh = 2; 
                if (isAudioPlaying) {
                    let wave = Math.sin(time + i * 0.2) * Math.cos(time * 0.8 + i * 0.5);
                    bh = Math.max(2, (wave * 0.5 + 0.5) * (Math.random() * 0.5 + 0.5) * 50 * userVolume * faderLevel);
                }
                ctx.fillStyle = 'rgba(208, 2, 27, 0.85)'; 
                ctx.fillRect(i * (140/32), 60 - bh, (140/32)*0.8, bh); 
            }
        }

        function playPip(dur) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let t = audioCtx.currentTime;
            let osc = audioCtx.createOscillator(), pGain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.value = 1000; osc.connect(pGain); pGain.connect(audioCtx.destination); 
            let pipVolume = userVolume * 0.5; 
            pGain.gain.setValueAtTime(0, t); pGain.gain.setValueAtTime(pipVolume, t + 0.001);
            pGain.gain.setValueAtTime(pipVolume, t + dur - 0.001); pGain.gain.setValueAtTime(0, t + dur);
            osc.start(t); osc.stop(t + dur + 0.01);
        }

        function gestionarPips(m, s) {
            let isApproachingHour = (m === 59 || m === 29);
            if (!isApproachingHour && !(m === 0 || m === 30)) { lastPipFired = -1; return; }
            if (isApproachingHour && s >= 55 && s <= 59) { if (lastPipFired !== s) { lastPipFired = s; playPip(0.1); } } 
            else if ((m === 0 || m === 30) && s === 0) { if (lastPipFired !== s) { lastPipFired = s; playPip(0.5); } }
        }

        function preloadTopHourAssets(h, m, s) {
            if ((m === 59 || m === 29) && s >= 45 && lastPreloadedMin !== m) {
                lastPreloadedMin = m;
                let nextH = (h + 1) % 24;
                let curH = (nextH === 0) ? library.chimes : (library.hours[nextH] || library.hours['default']);
                
                let toPreload = [];
                if (m === 59 && curH) toPreload.push(curH);
                
                let topNews = (m === 59) ? (library.breaking_news || library.news) : library.thirty_news;
                if (topNews) toPreload.push(topNews);
                if (library.weather) toPreload.push(library.weather);
                if (library.traffic) toPreload.push(library.traffic);

                toPreload.forEach(itm => {
                    if (itm && itm.src) {
                        let tempAudio = new Audio();
                        tempAudio.preload = "auto";
                        tempAudio.src = itm.src;
                        tempAudio.load();
                    }
                });
            }
        }

        let broadcastLoopTimer = null;
        function toggleBroadcast() {
            if (!systemOn) {
                initAudio(); 
                visStartTime = Date.now(); 
                
                // --- MICRO-ARREGLO: Limpieza absoluta al encender ---
                deckA.pause(); deckA.removeAttribute('src'); deckA.load();
                deckB.pause(); deckB.removeAttribute('src'); deckB.load();
                
                deckA.src = SILENCE_MP3; safePlay(deckA); 
                deckB.src = SILENCE_MP3; safePlay(deckB);
                
                systemOn = true; 
                el.btn.classList.add('active'); 
                el.tally.classList.add('live'); 
                updateBtnState(); 
                requestAnimationFrame(visualLoop); 
                
                function loop() { 
                    if (systemOn) { 
                        broadcastLogic(); 
                        
                        // --- MICRO-ARREGLO: Salvavidas en segundo plano (muy ligero, 1 vez por segundo) ---
                        let t = getSpainTime();
                        gestionarFaders(t.getMinutes(), t.getSeconds(), t.getMilliseconds());
                        
                        broadcastLoopTimer = setTimeout(loop, 1000); 
                    } 
                }
                loop();
            } else {
                systemOn = false; 
                el.btn.classList.remove('active'); 
                el.tally.classList.remove('live'); 
                updateBtnState();
                clearTimeout(broadcastLoopTimer);
                
                // --- MICRO-ARREGLO: Vaciado total de memoria al apagar ---
                activeDeck.pause(); activeDeck.removeAttribute('src'); activeDeck.load();
                if (fadingDeck) { fadingDeck.pause(); fadingDeck.removeAttribute('src'); fadingDeck.load(); fadingDeck = null; }
                
                currentSourceUrl = ""; 
                updateDisplay({ title: "Emisión Detenida", artist: "Off Air", img: "" }, '<i class="fas fa-power-off"></i> OFF', "status-badge off");
                el.canvas.getContext('2d').clearRect(0, 0, el.canvas.width, el.canvas.height);
            }
        }

        function broadcastLogic() {
            if (!systemOn) return;
            const now = getSpainTime(), d = now.getDay(), h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();
            const secInDay = h * 3600 + m * 60 + s, secInHour = m * 60 + s;
            
            gestionarPips(m, s);
            preloadTopHourAssets(h, m, s);

            if (s === lastScheduleSec) return;
            lastScheduleSec = s;

            // 1. RECONSTRUIR EL BLOQUE EN PUNTO (independiente del minuto en el que estemos)
            let tohSeq = [];
            let curH = (h === 0) ? library.chimes : (library.hours[h] || library.hours['default']);
            if (curH) {
                tohSeq.push({...curH, computedMode: 'HOUR'});
                tohSeq.push({ src: SILENCE_MP3, title: "Radio Maitino", artist: "Pausa", img: CONFIG.defaultLogo, type: "silence", dur: 1, computedMode: 'SILENCE' });
            }
            let topNews = library.breaking_news || library.news;
            if (topNews) {
                tohSeq.push({...topNews, computedMode: 'NEWS'});
                tohSeq.push({ src: SILENCE_MP3, title: "Radio Maitino", artist: "Pausa", img: CONFIG.defaultLogo, type: "silence", dur: 1, computedMode: 'SILENCE' });
            }
            if (library.weather) tohSeq.push({...library.weather, computedMode: 'WEATHER'});
            if (library.traffic) tohSeq.push({...library.traffic, computedMode: 'TRAFFIC'});
            
            let tohBlockDur = tohSeq.reduce((a, b) => a + Math.max(1, b.dur), 0);

            // 2. RECONSTRUIR EL BLOQUE DE LA MEDIA HORA
            let halfSeq = [];
            if (library.thirty_news) {
                halfSeq.push({...library.thirty_news, computedMode: 'THIRTY_BREAKING_NEWS'});
                halfSeq.push({ src: SILENCE_MP3, title: "Radio Maitino", artist: "Pausa", img: CONFIG.defaultLogo, type: "silence", dur: 1, computedMode: 'SILENCE' });
                if (library.weather) halfSeq.push({...library.weather, computedMode: 'WEATHER'});
                if (library.traffic) halfSeq.push({...library.traffic, computedMode: 'TRAFFIC'});
            }
            let halfBlockDur = halfSeq.reduce((a, b) => a + Math.max(1, b.dur), 0);

            // 3. OBTENER PROGRAMA PROGRAMADO ACTUAL
            let normToday = now.getDate() + "/" + (now.getMonth() + 1) + "/" + now.getFullYear();
            let specificDateShows = library.scheduleDates ? (library.scheduleDates[normToday] || []) : [];
            let scheduledShow = specificDateShows.find(sh => secInDay >= sh.startSecs && secInDay < sh.startSecs + sh.dur);
            if (!scheduledShow) scheduledShow = (library.schedule[d] || []).find(sh => secInDay >= sh.startSecs && secInDay < sh.startSecs + sh.dur);

            // Supresión de boletines si el programa es en directo/especial
            let suppressNews = scheduledShow && ['estudiolive', 'sports', 'live', 'special'].includes(scheduledShow.type);
            if (suppressNews) { tohSeq = []; tohBlockDur = 0; halfSeq = []; halfBlockDur = 0; }

            let nextItem = null, seekPos = 0, mode = 'FILLER';

            // 4. LÓGICA DE PRIORIDADES
            if (library.breaking) {
                nextItem = library.breaking;
                if (library.breaking.type === 'breakinglive') { mode = 'BREAKINGLIVE'; seekPos = 0; }
                else if (library.breaking.type === 'estudiolive') { mode = 'ESTUDIOLIVE'; seekPos = 0; }
                else { seekPos = (Math.floor(Date.now() / 1000)) % Math.max(1, library.breaking.dur); mode = 'BREAKING'; }
            }
            else if (secInHour < tohBlockDur && !suppressNews) {
                // Estamos dentro del bloque de la hora en punto
                let c = secInHour;
                for (let itm of tohSeq) { 
                    let idur = Math.max(1, itm.dur); 
                    if (c < idur) { nextItem = itm; seekPos = c; mode = itm.computedMode; break; } 
                    c -= idur; 
                }
            }
            else if (secInHour >= 1800 && secInHour < (1800 + halfBlockDur) && !suppressNews) {
                // Estamos dentro del bloque de la media hora
                let c = secInHour - 1800;
                for (let itm of halfSeq) {
                    let idur = Math.max(1, itm.dur);
                    if (c < idur) { nextItem = itm; seekPos = c; mode = itm.computedMode; break; }
                    c -= idur;
                }
            }
            else if (scheduledShow) {
                // Ajuste exacto para arrancar el programa en 00 tras las noticias
                let delay = 0;
                if (!suppressNews) {
                    if (scheduledShow.startSecs % 3600 === 0) delay = tohBlockDur;
                    else if (scheduledShow.startSecs % 3600 === 1800) delay = halfBlockDur;
                }
                
                nextItem = scheduledShow; 
                // Restamos el delay del tiempo transcurrido en el bloque para que empiece en cero
                seekPos = Math.max(0, (secInDay - scheduledShow.startSecs) - delay); 
                mode = scheduledShow.type.toUpperCase();
            }
            else {
                // Relleno Musical (Filler)
                mode = 'FILLER'; 
                let seq = []; 
                library.filler.forEach((f, idx) => { 
                    seq.push(f); 
                    if (idx % 2 === 0 && library.jingles.length > 0) seq.push(library.jingles[idx % library.jingles.length]); 
                });
                if (seq.length > 0) { 
                    let total = seq.reduce((a, b) => a + Math.max(1, b.dur), 0);
                    let epochSecs = Math.floor(Date.now() / 1000); 
                    let c = epochSecs % (total || 1); 
                    for (let itm of seq) { 
                        let idur = Math.max(1, itm.dur); 
                        if (c < idur) { nextItem = itm; seekPos = c; break; } 
                        c -= idur; 
                    } 
                }
            }

            if (!isDataLoaded) { nextItem = { src: SILENCE_MP3, title: "Conectando...", artist: "Sintonizando emisión...", img: CONFIG.defaultLogo, type: "loading", dur: 300 }; mode = 'LOADING'; }
            else if (!nextItem) { nextItem = { src: SILENCE_MP3, title: "Emisión Continuada", artist: "Silencio", img: CONFIG.defaultLogo, type: "off", dur: 300 }; mode = 'OFF'; }

            currentMode = mode; 
            if (nextItem) ejecutarAudio(nextItem, seekPos, mode);
        }

        function gestionarFaders(m, s, ms) {
            let e = s + (ms / 1000);
            
            if (m === 59) { 
                if (e >= 53 && e < 57) faderLevel = 1.0 - ((e - 53) / 4); 
                else if (e >= 57) { 
                    faderLevel = 0.0; 
                    if (!activeDeck.paused && !['LIVE','ESTUDIOLIVE','NEWS','BREAKING_NEWS','SPORTS','BREAKINGLIVE'].includes(currentMode)) {
                        activeDeck.pause(); 
                    }
                } 
                else faderLevel = 1.0;
            } 
            else if (m === 0) faderLevel = 1.0; 
            else if (m === 29 && e >= 55) faderLevel = 1.0 - (0.4 * ((e - 55) / 5)); 
            else if (m === 30 && e < 3) faderLevel = 0.6 + (0.4 * (e / 3)); 
            else faderLevel = 1.0;

            let bv = userVolume * faderLevel;
            let ns = Date.now() / 1000, ad = (activeDeck === deckA) ? deckA : deckB, fd = (fadingDeck === deckA) ? deckA : deckB;
            
            if (fadingDeck) {
                let fr = fadeOutEndTime - ns;
                if (fr <= 0 || faderLevel === 0.0 || currentCrossfade <= 0.1) { 
                    fadingDeck.pause(); fadingDeck.removeAttribute('src'); fadingDeck = null; fd.volume = 0; ad.volume = Math.max(0, Math.min(1, bv)); 
                } 
                else { 
                    let r = fr / currentCrossfade; fd.volume = Math.max(0, Math.min(1, bv * r)); ad.volume = Math.max(0, Math.min(1, bv * (1 - r))); 
                }
            } else { ad.volume = Math.max(0, Math.min(1, bv)); }
        }

        function updateDisplay(item, badgeHtml, badgeClass) {
            let html = '<i class="fas fa-music"></i> RADIO MAITINO';
            let bText = badgeHtml.toUpperCase();

            if (bText === 'ESTUDIOLIVE') html = '<i class="fas fa-microphone"></i> ESTUDIO EN DIRECTO';
            else if (bText === 'SPORTS') html = '<i class="fas fa-trophy"></i> DEPORTES';
            else if (bText === 'BREAKING') html = '<i class="fas fa-bolt"></i> ÚLTIMA HORA';
            else if (bText === 'BREAKINGLIVE') html = '<i class="fas fa-satellite-dish"></i> ÚLTIMA HORA DIRECTO';
            else if (bText === 'SPECIAL') html = '<i class="fas fa-star"></i> PROGRAMA ESPECIAL';
            else if (bText === 'CHIMES') html = '<i class="fas fa-bell"></i> MEDIANOCHE';
            else if (bText === 'HOUR') html = '<i class="fas fa-clock"></i> SEÑAL HORARIA';
            else if (bText === 'NEWS' || bText === 'BREAKING_NEWS') html = '<i class="fas fa-globe-europe"></i> BOLETÍN HORARIO';
            else if (bText === 'THIRTY_BREAKING_NEWS') html = '<i class="fas fa-bolt"></i> INFORMATIVO MEDIA HORA';
            else if (bText === 'WEATHER') html = '<i class="fas fa-cloud-sun"></i> EL TIEMPO';
            else if (bText === 'TRAFFIC') html = '<i class="fas fa-car"></i> ESTADO DEL TRÁFICO';
            else if (bText === 'LIVE') html = '<i class="fas fa-satellite-dish"></i> CONEXIÓN EXTERNA';
            else if (bText === 'AD') html = '<i class="fas fa-bullhorn"></i> PUBLICIDAD';
            else if (bText === 'JINGLE') html = '<i class="fas fa-wave-square"></i> RADIO MAITINO';
            else if (bText === 'SPACE') html = '<i class="fas fa-comments"></i> ESPACIO DE SERVICIO';
            else if (bText === 'PROMO') html = '<i class="fas fa-star"></i> PROMOCIÓN';
            else if (bText === 'PODCAST') html = '<i class="fas fa-history"></i> DIFERIDO';
            else if (bText === 'INTERVIEW') html = '<i class="fas fa-microphone-lines"></i> ENTREVISTA';
            else if (bText === 'EMERGENCY') html = '<i class="fas fa-triangle-exclamation"></i> ALERTA TÉCNICA';
            else if (bText === 'SHOW' || bText === 'SCHEDULE') html = '<i class="fas fa-broadcast-tower"></i> EN DIRECTO';
            else if (bText === 'LOADING') html = '<i class="fas fa-spinner fa-spin"></i> CONECTANDO...';
            else if (bText === 'OFF') html = 'FUERA DE ANTENA';
            else if (bText === 'SILENCE') { html = 'CONTINÚA...'; badgeClass = 'status-badge silence'; }

            if (bText === 'SPORTS' || item.type === 'sports') {
                let parts = item.title.split('|'); let main = parts[0].trim(); let score = parts[1] ? `<br><span class="score-box">${parts[1].trim()}</span>` : '';
                el.title.innerHTML = main + score;
            } else { el.title.innerText = item.title; }

            el.sub.innerText = item.artist; el.badge.innerHTML = html; el.badge.className = badgeClass;
            
            if (item.img && el.img.src !== item.img) { el.img.src = item.img; }
        }

        function ejecutarAudio(item, seek, mode) {
            let safeMode = mode.toUpperCase();

            if (currentSourceUrl !== item.src) {
                currentSourceUrl = item.src; fadingDeck = activeDeck; activeDeck = (activeDeck === deckA) ? deckB : deckA;
                activeDeck.src = item.src;
                
                let rt = Date.now() / 1000;
                let isStream = ['LIVE','ESTUDIOLIVE','SPORTS','BREAKINGLIVE'].includes(safeMode);
                
                activeDeck.onloadedmetadata = () => { 
                    let adj = seek + ((Date.now() / 1000) - rt); 
                    if (!isStream && adj > 2 && (!activeDeck.duration || adj < activeDeck.duration)) {
                        try { activeDeck.currentTime = adj; } catch(e) {}
                    }
                };
                
                activeDeck.oncanplay = () => { 
                    isTransitioning = false; 

                    if (['HOUR', 'NEWS', 'BREAKING_NEWS', 'THIRTY_BREAKING_NEWS', 'WEATHER', 'TRAFFIC', 'SILENCE'].includes(safeMode)) {
                        currentCrossfade = 0.0; 
                    } else if (['JINGLE', 'AD', 'SPACE', 'PROMO'].includes(safeMode) || (item.dur && item.dur <= 5)) {
                        currentCrossfade = 0.5; 
                    } else {
                        currentCrossfade = CONFIG.crossfadeDur; 
                    }

                    fadeOutEndTime = (Date.now() / 1000) + currentCrossfade; 
                    safePlay(activeDeck); 
                };
                activeDeck.load();
                updateDisplay(item, safeMode, `status-badge ${item.type || safeMode.toLowerCase()}`);
            } else {
                let isStream = ['LIVE','ESTUDIOLIVE','SPORTS','BREAKINGLIVE'].includes(safeMode);
                if (activeDeck.readyState >= 3 && !isStream) {
                    if (Math.abs(activeDeck.currentTime - seek) > 15) { try { activeDeck.currentTime = seek; } catch(e) {} }
                }
                if (activeDeck.paused && systemOn && !isTransitioning) safePlay(activeDeck);
            }
        }

        function updateScheduleUI() {
            let spainNow = getSpainTime();
            let d = spainNow.getDay(), curSecs = spainNow.getHours() * 3600 + spainNow.getMinutes() * 60 + spainNow.getSeconds();
            
            let normToday = spainNow.getDate() + "/" + (spainNow.getMonth() + 1) + "/" + spainNow.getFullYear();
            let specificToday = library.scheduleDates ? (library.scheduleDates[normToday] || []) : [];
            let showsToday = specificToday.concat(library.schedule[d] || []).slice().sort((a, b) => a.startSecs - b.startSecs);

            let dTom = new Date(spainNow.getTime() + 86400000);
            let normTomorrow = dTom.getDate() + "/" + (dTom.getMonth() + 1) + "/" + dTom.getFullYear();
            let specificTomorrow = library.scheduleDates ? (library.scheduleDates[normTomorrow] || []) : [];
            let showsTomorrow = specificTomorrow.concat(library.schedule[(d + 1) % 7] || []).slice().sort((a, b) => a.startSecs - b.startSecs);
            
            let upcoming = showsToday.filter(s => (s.startSecs + s.dur) > curSecs);
            let combined = upcoming.concat(showsTomorrow);
            let displayShows = combined.slice(0, 3);
            
            let html = '';
            if (displayShows.length === 0) { html = `<div class="schedule-item active"><span>Emisión Continuada</span><span class="time">--:--</span></div>`; } 
            else {
                displayShows.forEach((s, i) => {
                    let title = s.title.split('|')[0].trim();
                    let hh = Math.floor(s.startSecs / 3600), mm = Math.floor((s.startSecs % 3600) / 60);
                    let timeStr = String(hh).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
                    let isActive = (i === 0 && curSecs >= s.startSecs);
                    html += `<div class="schedule-item ${isActive ? 'active' : ''}"><span>${title}</span><span class="time">${timeStr}</span></div>`;
                });
            }
            el.sch.innerHTML = html;
        }

        function visualLoop() { 
            if (systemOn) { 
                let t = getSpainTime(), ssNum = t.getSeconds();
                if (ssNum !== lastClockSec) {
                    let hh = String(t.getHours()).padStart(2, '0'), mm = String(t.getMinutes()).padStart(2, '0'), ss = String(ssNum).padStart(2, '0');
                    el.clock.innerHTML = `${hh}:${mm}:${ss}`;
                    if (ssNum === 0) updateScheduleUI(); 
                    lastClockSec = ssNum;
                }
                gestionarFaders(t.getMinutes(), t.getSeconds(), t.getMilliseconds());
                requestAnimationFrame(visualLoop); 
            } 
        }

        initSystem();
    </script>
